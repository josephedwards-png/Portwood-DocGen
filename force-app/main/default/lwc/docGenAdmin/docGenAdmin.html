<template>
    <lightning-card title="Your Templates" icon-name="standard:template">
        <lightning-tabset variant="scoped" active-tab-value={activeMainTab}>
                <lightning-tab label="Create New" value="new_template" onactive={handleWizardTabActive}>
                    <div class="slds-var-p-around_medium">
                        <lightning-progress-indicator current-step={currentWizardStep} type="base" variant="base">
                            <lightning-progress-step label="Name Your Template" value="1"></lightning-progress-step>
                            <lightning-progress-step label="Pick Your Data" value="2"></lightning-progress-step>
                            <lightning-progress-step label="Review &amp; Create" value="3"></lightning-progress-step>
                        </lightning-progress-indicator>
                        
                        <div class="slds-var-m-vertical_large">
                            <!-- Step 1: Details -->
                            <template if:true={isStep1}>
                                <div class="slds-grid slds-gutters">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input label="Template Name" value={newTemplateName} onchange={handleNameChange} required></lightning-input>
                                        <lightning-input label="Category" value={newTemplateCategory} onchange={handleCategoryChange} class="slds-var-m-top_small"></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-combobox label="Type" value={newTemplateType} options={typeOptions} onchange={handleTypeChange} required></lightning-combobox>
                                        <lightning-combobox label="Output Format" value={newTemplateOutputFormat} options={outputFormatOptions} onchange={handleOutputFormatChange} class="slds-var-m-top_small" required></lightning-combobox>
                                        <lightning-textarea label="Description" value={newTemplateDesc} onchange={handleDescChange} class="slds-var-m-top_small"></lightning-textarea>
                                    </div>
                                </div>
                            </template>

                            <!-- Step 2: Query Builder -->
                            <template if:true={isStep2}>
                                <div class="slds-grid slds-grid_align-end slds-var-m-bottom_small">
                                    <lightning-input type="toggle"
                                        label="Manual Query Mode"
                                        checked={isNewManualQuery}
                                        onchange={handleNewManualQueryToggle}
                                        message-toggle-active="Manual"
                                        message-toggle-inactive="Builder">
                                    </lightning-input>
                                </div>

                                <!-- Visual Builder (Column Layout) -->
                                <template if:false={isNewManualQuery}>
                                    <c-doc-gen-column-builder
                                        selected-object={newTemplateObject}
                                        query-config={newTemplateQuery}
                                        onconfigchange={handleConfigChange}>
                                    </c-doc-gen-column-builder>
                                </template>

                                <!-- Manual Mode -->
                                <template if:true={isNewManualQuery}>
                                    <div class="slds-box slds-theme_shade">
                                        <lightning-input
                                            label="Base Object API Name"
                                            value={newTemplateObject}
                                            onchange={handleNewManualObjectChange}
                                            required
                                            class="slds-var-m-bottom_small">
                                        </lightning-input>
                                        <lightning-textarea
                                            label="SOQL Query Fields"
                                            value={newTemplateQuery}
                                            onchange={handleNewQueryStringChange}
                                            class="slds-text-font_monospace"
                                            style="min-height: 200px;">
                                        </lightning-textarea>
                                        <p class="slds-text-body_small slds-var-m-top_x-small">
                                            Enter comma-separated fields or subqueries. Example: <code>Name, Industry, (SELECT LastName FROM Contacts)</code>
                                        </p>
                                    </div>
                                </template>
                            </template>

                            <!-- Step 3: Review & Create -->
                            <template if:true={isStep3}>
                                <div class="slds-box slds-theme_shade">
                                    <h3 class="slds-text-heading_small">Review Template</h3>
                                    <p class="slds-var-m-top_small"><strong>Name:</strong> {newTemplateName}</p>
                                    <p><strong>Object:</strong> {newTemplateObject}</p>
                                    <p><strong>Query:</strong> {newTemplateQuery}</p>
                                    <p class="slds-var-m-top_medium">Click "Create Template" to save.</p>
                                </div>
                            </template>
                        </div>

                        <!-- Footer Navigation -->
                        <div class="slds-clearfix">
                            <div class="slds-float_right">
                                <lightning-button 
                                    label="Back" 
                                    onclick={handlePrevStep} 
                                    disabled={isBackDisabled} 
                                    class="slds-var-m-right_small">
                                </lightning-button>
                                
                                <template if:false={isStep3}>
                                    <lightning-button 
                                        label="Next" 
                                        variant="brand" 
                                        onclick={handleNextStep}>
                                    </lightning-button>
                                </template>
                                <template if:true={isStep3}>
                                    <lightning-button 
                                        label="Create Template" 
                                        variant="success" 
                                        onclick={createTemplate}>
                                    </lightning-button>
                                </template>
                            </div>
                        </div>
                    </div>
                </lightning-tab>

            <lightning-tab label="Your Templates" value="list" onactive={handleTabActive}>
                <div class="slds-var-p-around_medium">
                    <div class="slds-grid slds-grid_vertical-align-end slds-var-m-bottom_medium">
                        <div class="slds-col slds-size_1-of-3">
                            <lightning-input
                                type="search"
                                label="Search Templates"
                                placeholder="Search by Name, Category, or Object..."
                                value={searchKey}
                                onchange={handleSearch}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-var-p-left_small">
                            <lightning-button
                                icon-name="utility:refresh"
                                onclick={handleRefresh}
                                label="Refresh"
                                title="Refresh Templates"
                                variant="neutral">
                            </lightning-button>
                        </div>
                    </div>
                    <lightning-datatable
                        key-field="Id"
                        data={filteredTemplates}
                        columns={columns}
                        onrowaction={handleRowAction}
                        hide-checkbox-column>
                    </lightning-datatable>
                </div>
            </lightning-tab>
        </lightning-tabset>
    </lightning-card>

    <!-- Empty State / Sample Install -->
    <template if:true={showInstallSample}>
        <div class="slds-var-m-around_medium slds-text-align_center">
            <p class="slds-var-m-bottom_small">You don't have any templates yet. Click "Create New" above to get started.</p>
            <lightning-button label="Install Sample Data" onclick={handleInstallSample} variant="brand"></lightning-button>
        </div>
    </template>

    <!-- Edit Template Modal -->
    <template if:true={isEditModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" title="Close" variant="bare-inverse" class="slds-modal__close" onclick={closeEditModal}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Edit / View Template</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <lightning-tabset variant="scoped" active-tab-value={activeEditTab}>
                        <!-- Tab 1: Settings -->
                        <lightning-tab label="Settings" value="details">
                            <div class="slds-grid slds-gutters">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input label="Template Name" value={editTemplateName} onchange={handleEditNameChange} required></lightning-input>
                                    <lightning-input label="Category" value={editTemplateCategory} onchange={handleEditCategoryChange} class="slds-var-m-top_small"></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-combobox label="Type" value={editTemplateType} options={typeOptions} onchange={handleEditTypeChange} required></lightning-combobox>
                                    <lightning-combobox label="Output Format" value={editTemplateOutputFormat} options={outputFormatOptions} onchange={handleEditOutputFormatChange} class="slds-var-m-top_small" required></lightning-combobox>
                                    <lightning-input label="Base Object API Name" value={editTemplateObject} readonly class="slds-var-m-top_small"></lightning-input>
                                    <lightning-input type="toggle" label="Default Template for this Object" checked={editTemplateIsDefault} onchange={handleEditDefaultChange} class="slds-var-m-top_small" message-toggle-active="Yes" message-toggle-inactive="No"></lightning-input>
                                    
                                    <c-doc-gen-title-editor
                                        value={editTemplateTitleFormat}
                                        query-config={editTemplateQuery}
                                        onchange={handleTitleFormatChange}
                                        class="slds-var-m-top_small slds-show">
                                    </c-doc-gen-title-editor>
                                </div>
                            </div>
                            <lightning-textarea label="Description" value={editTemplateDesc} onchange={handleEditDescChange} class="slds-var-m-top_small"></lightning-textarea>

                            <!-- Test/Sample Record -->
                            <div class="slds-box slds-theme_shade slds-var-m-top_medium" style="border-radius: 6px;">
                                <h4 class="slds-text-title_bold slds-var-m-bottom_x-small">Sample Record for Previews</h4>
                                <p class="slds-text-body_small slds-text-color_weak slds-var-m-bottom_small">Set a record to use for sample generation and bulk preview. This lets you see what your document will look like before running a bulk job.</p>
                                <lightning-record-picker
                                    label="Sample Record"
                                    object-api-name={editTemplateObject}
                                    value={editTemplateTestRecordId}
                                    onchange={handleEditTestRecordChange}
                                    placeholder="Search for a record...">
                                </lightning-record-picker>
                                <template if:true={editTemplateTestRecordId}>
                                    <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_xx-small">ID: {editTemplateTestRecordId}</p>
                                </template>
                            </div>
                        </lightning-tab>

                        <!-- Tab 2: Query Configuration -->
                        <lightning-tab label="Query Configuration" value="query">
                             <!-- Header Control -->
                             <div class="slds-grid slds-grid_align-spread slds-var-m-bottom_small">
                                 <div class="slds-col">
                                     <p class="slds-text-body_small slds-text-color_weak">
                                         Configure the data query for this template.
                                     </p>
                                 </div>
                                 <div class="slds-col">
                                     <lightning-input type="toggle" 
                                        label="Manual Query Mode" 
                                        checked={isManualQuery} 
                                        onchange={handleManualQueryToggle} 
                                        message-toggle-active="Manual" 
                                        message-toggle-inactive="Builder">
                                     </lightning-input>
                                 </div>
                             </div>

                             <!-- Builder Mode -->
                             <template if:false={isManualQuery}>
                                <c-doc-gen-column-builder
                                    selected-object={editTemplateObject}
                                    query-config={editTemplateQuery}
                                    onconfigchange={handleEditConfigChange}>
                                </c-doc-gen-column-builder>
                             </template>

                             <!-- Manual Mode -->
                             <template if:true={isManualQuery}>
                                 <div class="slds-box slds-theme_shade">
                                     <lightning-textarea 
                                        label="SOQL Query Fields" 
                                        value={editTemplateQuery} 
                                        onchange={handleQueryStringChange}
                                        class="slds-text-font_monospace"
                                        style="min-height: 200px;">
                                     </lightning-textarea>
                                     <p class="slds-text-body_small slds-var-m-top_x-small">
                                         Enter comma-separated fields or subqueries. Example: <code>Name, Industry, (SELECT LastName FROM Contacts)</code>
                                     </p>
                                 </div>
                             </template>
                        </lightning-tab>

                        <!-- Tab 3: Template Tags — simple copy-paste list -->
                        <lightning-tab label="Copy-Paste Tags" value="tags">
                            <div class="slds-var-m-bottom_small">
                                <p class="slds-text-body_small slds-text-color_weak">Click any tag to copy it. Paste directly into your Word template.</p>
                            </div>
                            <div class="slds-box slds-theme_shade" style="border-radius: 6px; max-height: 500px; overflow-y: auto;">
                                <template if:true={editTemplateTags}>
                                    <template for:each={editTemplateTags} for:item="section">
                                        <div key={section.name} class="slds-var-m-bottom_small">
                                            <h4 class="slds-text-title_bold slds-var-m-bottom_xx-small">{section.name}</h4>
                                            <template if:true={section.isLoop}>
                                                <code class="slds-var-m-right_x-small" style="font-size: 0.8125rem; color: #0176d3; cursor: pointer; background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #d1e3f8;" data-tag={section.loopStart} onclick={handleCopyEditTag}>{section.loopStart}</code>
                                                <span class="slds-text-body_small slds-text-color_weak">...your content...</span>
                                                <code class="slds-var-m-left_x-small" style="font-size: 0.8125rem; color: #0176d3; cursor: pointer; background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #d1e3f8;" data-tag={section.loopEnd} onclick={handleCopyEditTag}>{section.loopEnd}</code>
                                            </template>
                                            <div class="slds-var-m-top_xx-small" style="display: flex; flex-wrap: wrap; gap: 4px;">
                                                <template for:each={section.tags} for:item="tag">
                                                    <code key={tag.code} style="font-size: 0.8125rem; color: #0176d3; cursor: pointer; background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #e5e5e5;" data-tag={tag.code} onclick={handleCopyEditTag}>{tag.code}</code>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={editTemplateTags}>
                                    <p class="slds-text-body_small slds-text-color_weak">No tags configured. Edit the query configuration to add fields.</p>
                                </template>
                            </div>
                        </lightning-tab>

                        <!-- Tab 4: Document & History -->
                        <lightning-tab label="Document & History" value="document">
                             <div class="slds-var-m-top_medium">
                                <!-- Current File Section -->
                                <article class="slds-card slds-var-m-bottom_medium slds-theme_shade">
                                     <div class="slds-card__header slds-grid">
                                         <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                             <div class="slds-media__figure">
                                                 <lightning-icon icon-name="doctype:word" size="small"></lightning-icon>
                                             </div>
                                             <div class="slds-media__body">
                                                 <h2 class="slds-card__header-title">
                                                     <span class="slds-text-heading_small">Current Template File</span>
                                                     <template if:true={currentFileId}>
                                                         <lightning-badge label="Active" class="slds-var-m-left_small slds-theme_success"></lightning-badge>
                                                         <template if:true={currentVersionLabel}>
                                                             <lightning-badge label={currentVersionLabel} class="slds-var-m-left_x-small slds-theme_info"></lightning-badge>
                                                         </template>
                                                     </template>
                                                 </h2>
                                             </div>
                                         </header>
                                          <div class="slds-no-flex">
                                              <template if:true={currentFileId}>
                                                  <lightning-button label="Download Current" icon-name="utility:download" onclick={downloadTemplate}></lightning-button>
                                              </template>
                                          </div>
                                     </div>
                                     <div class="slds-card__body slds-card__body_inner">
                                         <lightning-file-upload
                                            label="Upload New Version"
                                            name="fileUploaderEdit"
                                            accept={acceptedFormats}
                                            record-id={editTemplateId}
                                            onuploadfinished={handleEditUploadFinished}>
                                        </lightning-file-upload>
                                        
                                        <template if:true={uploadedFileName}>
                                            <div class="slds-box slds-box_xx-small slds-theme_success slds-var-m-top_small">
                                                <lightning-icon icon-name="utility:check" size="xx-small" class="slds-var-m-right_x-small" variant="inverse"></lightning-icon>
                                                <strong>Ready to Save:</strong> {uploadedFileName}
                                            </div>
                                        </template>
                                        
                                        <p class="slds-text-body_small slds-var-m-top_x-small"><strong>Note:</strong> Uploading attaches the file. You must click <strong>"Save New Version"</strong> below to create a new Version Snapshot.</p>
                                     </div>
                                 </article>

                                <!-- Version History -->
                                <div class="slds-var-m-top_large">
                                    <h3 class="slds-text-heading_small slds-var-m-bottom_medium">Version History</h3>
                                    
                                    <template if:false={hasVersions}>
                                         <div class="slds-text-color_weak slds-var-p-around_medium slds-text-align_center">
                                             <p>No versions available yet.</p>
                                             <p class="slds-text-body_small">Upload a file and save to create v1.</p>
                                         </div>
                                    </template>

                                    <template if:true={hasVersions}>
                                        <div class="slds-var-m-bottom_small slds-var-p-around_small slds-theme_info slds-box">
                                            <lightning-icon icon-name="utility:info" size="x-small" class="slds-var-m-right_x-small"></lightning-icon>
                                            Restoring a version will activate its configuration immediately.
                                        </div>
                                        <div style="height: 300px;">
                                            <lightning-datatable
                                                key-field="Id"
                                                data={versions}
                                                columns={versionColumns}
                                                onrowaction={handleRestoreVersion}
                                                hide-checkbox-column>
                                            </lightning-datatable>
                                        </div>
                                    </template>
                                </div>
                             </div>
                        </lightning-tab>
                    </lightning-tabset>
                </div>
                <!-- Footer with Renamed Buttons -->
                <footer class="slds-modal__footer">
                    <div class="slds-grid slds-grid_align-spread">
                        <div class="slds-col">
                            <lightning-button label="Generate Sample Document" icon-name="utility:download" title="Generate real sample document" onclick={handleTestGenerate} disabled={editTemplateTestRecordIdEmpty}></lightning-button>
                        </div>
                        <div class="slds-col">
                           <lightning-button variant="neutral" label="Cancel" onclick={closeEditModal}></lightning-button>
                           <lightning-button variant="brand" label="Save Details" onclick={handleSaveOnly} class="slds-var-m-left_small"></lightning-button>
                           <lightning-button variant="brand-outline" label="Save as New Version" onclick={handleSaveAndClose} class="slds-var-m-left_small"></lightning-button>
                        </div>
                    </div>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
    
    <!-- Preview Modal -->
    <template if:true={isPreviewModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" title="Close" variant="bare-inverse" class="slds-modal__close" onclick={closePreviewModal}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Version Preview: {previewVersion.VersionNumber}</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <!-- Version Metadata -->
                    <div class="slds-grid slds-gutters slds-var-m-bottom_medium">
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Created</p>
                            <p><lightning-formatted-date-time value={previewVersion.CreatedDate} year="numeric" month="short" day="numeric" hour="2-digit" minute="2-digit"></lightning-formatted-date-time></p>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Created By</p>
                            <p>{previewVersion.CreatedByName}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Status</p>
                            <p>
                                <template if:true={previewVersion.Is_Active__c}>
                                    <lightning-badge label="Active" class="slds-theme_success"></lightning-badge>
                                </template>
                                <template if:false={previewVersion.Is_Active__c}>
                                    <lightning-badge label="Inactive"></lightning-badge>
                                </template>
                            </p>
                        </div>
                    </div>

                    <div class="slds-grid slds-gutters slds-var-m-bottom_medium">
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Base Object</p>
                            <p>{previewVersion.Base_Object_API__c}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Type</p>
                            <p>{previewVersion.Type__c}</p>
                        </div>
                        <div class="slds-col slds-size_1-of-3">
                            <p class="slds-text-body_small slds-text-color_weak">Category</p>
                            <p>{previewVersion.Category__c}</p>
                        </div>
                    </div>

                    <!-- Query Config -->
                    <div class="slds-box slds-var-m-bottom_medium">
                        <div class="slds-grid slds-grid_align-spread slds-var-m-bottom_small">
                            <h3 class="slds-text-heading_small">Query Configuration</h3>
                        </div>
                        <template if:true={previewVersion.Query_Config__c}>
                            <div class="slds-scrollable_y" style="max-height: 200px;">
                                <pre class="slds-var-p-around_small slds-theme_shade" style="white-space: pre-wrap; word-break: break-word; font-size: 0.8125rem;">{previewVersionQueryFormatted}</pre>
                            </div>
                        </template>
                        <template if:false={previewVersion.Query_Config__c}>
                            <p class="slds-text-color_weak">No query configuration saved for this version.</p>
                        </template>
                    </div>

                    <!-- Template File -->
                    <div class="slds-box slds-var-m-bottom_medium">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <h3 class="slds-text-heading_small">Template File</h3>
                            <template if:true={previewVersion.Content_Version_Id__c}>
                                <lightning-button label="Download Template" icon-name="utility:download" variant="neutral" onclick={handlePreviewDownload}></lightning-button>
                            </template>
                        </div>
                        <template if:false={previewVersion.Content_Version_Id__c}>
                            <p class="slds-text-color_weak slds-var-m-top_small">No template file reference saved for this version.</p>
                        </template>
                    </div>

                    <!-- Generate Sample -->
                    <div class="slds-box slds-theme_shade">
                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                            <div>
                                <h3 class="slds-text-heading_small">Generate Sample</h3>
                                <p class="slds-text-body_small slds-text-color_weak">Generate a document using this version's template and the selected test record.</p>
                            </div>
                            <lightning-button label="Generate Sample" icon-name="utility:page" variant="brand" onclick={handlePreviewGenerate} disabled={previewGenerateDisabled}></lightning-button>
                        </div>
                        <template if:true={previewGenerateDisabled}>
                            <p class="slds-text-color_weak slds-text-body_small slds-var-m-top_small">
                                <template if:false={previewVersion.Content_Version_Id__c}>
                                    No template file available for this version.
                                </template>
                                <template if:true={previewVersion.Content_Version_Id__c}>
                                    <template if:false={editTemplateTestRecordId}>
                                        Select a test record in the Template Tags tab first.
                                    </template>
                                </template>
                            </p>
                        </template>
                        <template if:true={isGeneratingPreview}>
                            <div class="slds-var-m-top_small slds-is-relative" style="height: 40px;">
                                <lightning-spinner alternative-text="Generating..." size="small"></lightning-spinner>
                            </div>
                        </template>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closePreviewModal} class="slds-var-m-right_small"></lightning-button>
                    <lightning-button label="Activate This Version" variant="brand" onclick={handleRestoreFromPreview} disabled={previewVersion.Is_Active__c}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>


    <!-- Sharing Modal -->
    <template if:true={isSharingModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" title="Close" variant="bare-inverse" class="slds-modal__close" onclick={handleCloseSharing}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium slds-hyphenate">Share Template</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <c-doc-gen-sharing 
                        record-id={sharingTemplateId}
                        onclose={handleCloseSharing}>
                    </c-doc-gen-sharing>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
