<template>
    <div class="slds-box slds-theme_default">
        <div class="slds-text-heading_medium slds-var-m-bottom_medium slds-text-align_center">
            <lightning-icon icon-name="utility:shield" size="medium" class="slds-var-m-right_small"></lightning-icon>
            Document Authenticator
        </div>

        <!-- Request ID Audit Trail (loaded from URL parameter) -->
        <template if:true={hasResults}>
            <div class="slds-box slds-theme_success slds-var-m-bottom_medium">
                <div class="slds-text-heading_small slds-var-m-bottom_small">
                    <lightning-icon icon-name="utility:success" size="small" class="slds-var-m-right_x-small"></lightning-icon>
                    Signature Certificate Verified
                </div>
                <p class="slds-var-m-bottom_medium" style="font-size:0.8125rem;">
                    The following signatures were recorded for this document.
                </p>

                <template for:each={requestResults} for:item="signer">
                    <div key={signer.signerName} class="slds-box slds-box_x-small slds-theme_default slds-var-m-bottom_small">
                        <div class="slds-grid slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_x-small">
                                <strong>Signer</strong><br/>
                                {signer.signerName}
                                <template if:true={signer.roleName}>
                                    <span class="slds-badge slds-var-m-left_xx-small">{signer.roleName}</span>
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_x-small">
                                <strong>Email</strong><br/>
                                {signer.signerEmail}
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_x-small">
                                <strong>Signed</strong><br/>
                                <lightning-formatted-date-time value={signer.signedDate} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit" time-zone-name="short"></lightning-formatted-date-time>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_x-small">
                                <strong>Email Verified</strong><br/>
                                <template if:true={signer.pinVerifiedAt}>
                                    <lightning-icon icon-name="utility:check" size="xx-small" class="slds-var-m-right_xx-small"></lightning-icon>
                                    <lightning-formatted-date-time value={signer.pinVerifiedAt} year="numeric" month="short" day="2-digit" hour="2-digit" minute="2-digit" time-zone-name="short"></lightning-formatted-date-time>
                                </template>
                                <template if:false={signer.pinVerifiedAt}>
                                    N/A
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_x-small">
                                <strong>Consent</strong><br/>
                                <template if:true={signer.consentCaptured}>
                                    <lightning-icon icon-name="utility:check" size="xx-small" class="slds-var-m-right_xx-small"></lightning-icon> Granted
                                </template>
                                <template if:false={signer.consentCaptured}>
                                    Not recorded
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_x-small">
                                <strong>IP Address</strong><br/>
                                {signer.ipAddress}
                            </div>
                        </div>
                        <template if:true={signer.documentHash}>
                            <div style="margin-top:4px;font-size:0.6875rem;color:#706e6b;word-break:break-all;">
                                <strong>SHA-256:</strong> {signer.documentHash}
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>

        <!-- File Upload Verification -->
        <p class="slds-var-m-bottom_medium slds-text-align_center" style="font-size:0.8125rem;">
            <template if:true={hasRequestId}>
                You can also verify a specific file by uploading it below. The file is hashed in your browser and never uploaded.
            </template>
            <template if:false={hasRequestId}>
                Drop a signed PDF here to cryptographically verify its authenticity. The file never leaves your browser &mdash; only the hash is sent for verification.
            </template>
        </p>

        <div class="drop-zone slds-box slds-box_x-small slds-theme_shade slds-text-align_center slds-var-m-bottom_medium"
             ondragover={handleDragOver}
             ondrop={handleDrop}
             style="border: 2px dashed #0070d2; cursor: pointer; min-height: 100px; display: flex; align-items: center; justify-content: center; position: relative;">
            <p class="slds-text-body_regular slds-text-color_weak">Drag and drop PDF here, or click to browse.</p>
            <input type="file" accept=".pdf" onchange={handleFileSelect} class="slds-assistive-text" id="file-upload" />
            <label for="file-upload" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; cursor: pointer;"></label>
        </div>

        <template if:true={isProcessing}>
            <div class="slds-align_absolute-center slds-var-m-bottom_medium">
                <lightning-spinner alternative-text="Verifying" size="small"></lightning-spinner>
                <span class="slds-var-m-left_small">Computing cryptographic hash...</span>
            </div>
        </template>

        <template if:true={result}>
            <div class={resultContainerClass} role="alert">
                <div class="slds-text-heading_small slds-var-m-bottom_small">
                    <lightning-icon icon-name={resultIcon} size="small" class="slds-var-m-right_x-small"></lightning-icon>
                    {result.message}
                </div>

                <template if:true={result.isValid}>
                    <div class="slds-grid slds-wrap slds-var-m-top_medium">
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <strong>Signer Name</strong><br/>
                            {result.signerName}
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <strong>Email</strong><br/>
                            {result.signerEmail}
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <strong>Signed Date</strong><br/>
                            <lightning-formatted-date-time value={result.signedDate} year="numeric" month="long" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                        </div>
                        <div class="slds-col slds-size_1-of-2 slds-var-p-bottom_small">
                            <strong>IP Address</strong><br/>
                            {result.ipAddress}
                        </div>
                    </div>
                    <template if:true={result.documentHash}>
                        <div style="margin-top:4px;font-size:0.6875rem;color:#706e6b;word-break:break-all;">
                            <strong>SHA-256:</strong> {result.documentHash}
                        </div>
                    </template>
                </template>
            </div>
        </template>
    </div>
</template>
