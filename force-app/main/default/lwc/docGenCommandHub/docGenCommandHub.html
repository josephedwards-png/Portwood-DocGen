                                <!-- E-SIGNATURES -->
                                <!-- ============================================ -->

                                <section id="sig-overview" class="content-section">
                                    <h3 class="section-heading">Electronic Signatures</h3>
                                    <p>DocGen includes a built-in Simple Electronic Signature (SES) system. Signers receive an email, verify their identity with a PIN, review the document, type their name, and agree to sign. Every step is recorded in a tamper-evident audit trail.</p>

                                    <div class="card-tip info">
                                        <strong>Legal Standard</strong>
                                        <p>Typed-name signatures are legally valid under the US ESIGN Act and UETA. They carry the same legal weight as drawn signatures for SES use cases. DocGen captures consent, email verification, IP address, and user agent for every signature.</p>
                                    </div>

                                    <div class="limit-grid">
                                        <div class="limit-card info">
                                            <strong>Email PIN Verification</strong>
                                            <p>Signers enter their email and receive a 6-digit code. This proves they control the inbox at the moment of signing. PINs expire after 10 minutes and lock after 3 failed attempts.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Consent Capture</strong>
                                            <p>Every signer must check an explicit consent checkbox before signing. The consent timestamp is recorded on the audit record with field history tracking.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Document Hash</strong>
                                            <p>A SHA-256 hash of the final PDF is computed and stored on the audit record. This proves the document has not been modified since signing.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Verification Certificate</strong>
                                            <p>Every signed PDF includes a certificate block showing signer names, roles, timestamps, and a verification URL. Anyone can verify the document's authenticity.</p>
                                        </div>
                                    </div>
                                </section>

                                <section id="sig-templates" class="content-section">
                                    <h3 class="section-heading">Signature Tag Syntax</h3>
                                    <p>Signature tags are placeholders you add to your Word template that tell DocGen where signers need to sign, initial, or add a date. When the document is sent for signature, these placeholders are highlighted for the signer. As they step through each one, the placeholder is replaced with their actual input.</p>

                                    <div class="card-tip info">
                                        <strong>Tag Format:</strong> <code>&#123;@Signature_<em>Role</em>:<em>Order</em>:<em>Type</em>&#125;</code>
                                        <p>All signature tags start with <code>@</code> to distinguish them from regular merge tags. The <code>@</code> prefix tells DocGen: "don't merge this with record data -- save it for the signer."</p>
                                    </div>

                                    <h3 class="section-heading" style="margin-top:1.5rem;">Understanding the Tag Parts</h3>

                                    <div class="limit-grid">
                                        <div class="limit-card info">
                                            <strong>Role</strong>
                                            <p>The role name identifies WHICH signer fills this placement. Use descriptive names like <code>Buyer</code>, <code>Seller</code>, <code>Witness</code>, or <code>Loan_Officer</code> (use underscores for multi-word roles). Each unique role creates a signer row in the Send For Signature form. The role is also shown to the signer so they know which placements are theirs.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Order</strong>
                                            <p>The order number controls the SEQUENCE a signer walks through their placements. Order <code>1</code> is shown first, then <code>2</code>, then <code>3</code>, etc. This is per-role -- Buyer's steps 1-3 are completely independent from Seller's steps 1-2. If omitted, defaults to <code>1</code>.</p>
                                        </div>
                                    </div>

                                    <h3 class="section-heading" style="margin-top:1.5rem;">Placement Types</h3>
                                    <p>The type determines WHAT the signer does at each placement and what appears in the final signed PDF.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Type</th><th>What the Signer Does</th><th>What Appears in the PDF</th><th>Example Tag</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td><strong>Full</strong></td>
                                                <td>Types their full legal name. A text input is pre-filled with their name -- they can edit it. The name is rendered in an italic signature-style font in the action bar.</td>
                                                <td>"Electronically signed by John Smith on April 13, 2026 at 3:45 PM PDT"</td>
                                                <td><code>&#123;@Signature_Buyer:1:Full&#125;</code></td>
                                            </tr>
                                            <tr>
                                                <td><strong>Initials</strong></td>
                                                <td>Types their initials. The input is pre-filled with auto-generated initials from their name (e.g., "J.S." for John Smith). They can edit.</td>
                                                <td>"J.S."</td>
                                                <td><code>&#123;@Signature_Buyer:2:Initials&#125;</code></td>
                                            </tr>
                                            <tr>
                                                <td><strong>Date</strong></td>
                                                <td>No input needed -- the signer just clicks Confirm. The date is automatically captured from the server at the moment they confirm.</td>
                                                <td>"April 13, 2026"</td>
                                                <td><code>&#123;@Signature_Buyer:3:Date&#125;</code></td>
                                            </tr>
                                            <tr>
                                                <td><strong>DatePick</strong></td>
                                                <td>A date picker appears where the signer selects a specific date. Useful for effective dates, start dates, or any date the signer needs to choose.</td>
                                                <td>The date they selected (e.g., "2026-05-01")</td>
                                                <td><code>&#123;@Signature_Buyer:4:DatePick&#125;</code></td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip">
                                        <strong>Backward Compatible</strong>
                                        <p><code>&#123;@Signature_Buyer&#125;</code> still works -- it is treated as <code>:1:Full</code>. If you have existing templates with the simple tag format, they will continue to work without changes. The signer will type their full name in a single step.</p>
                                    </div>

                                    <h3 class="section-heading" style="margin-top:1.5rem;">How It Works in Practice</h3>
                                    <p>When you select a template in the <strong>Send For Signature</strong> tab, DocGen scans the document for all <code>&#123;@Signature_...&#125;</code> tags and shows you:</p>
                                    <ul>
                                        <li>Which roles were detected (e.g., "Buyer", "Seller")</li>
                                        <li>How many placements each role has (e.g., "2 signatures, 1 initials")</li>
                                        <li>Signer rows are automatically created for each role -- just fill in the name and email</li>
                                    </ul>
                                    <p style="margin-top:0.75rem;">When the signer opens their link, they see the full document with highlighted markers at each placement. An arrow points to the current step. They work through each one in order -- sign here, initial there, confirm this date -- and watch the document fill in as they go. After the last placement, they check a consent box and submit.</p>

                                    <h3 class="section-heading" style="margin-top:1.5rem;">Common Patterns</h3>

                                    <div class="limit-grid">
                                        <div class="limit-card info">
                                            <strong>Simple Agreement</strong>
                                            <p>One signer, one signature. The most basic use case.</p>
                                            <p><code>&#123;@Signature_Buyer&#125;</code></p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Contract with Initials</strong>
                                            <p>One signer acknowledges sections with initials, then signs and dates at the end.</p>
                                            <p>
                                                Section 1: <code>&#123;@Signature_Buyer:1:Initials&#125;</code><br/>
                                                Section 2: <code>&#123;@Signature_Buyer:2:Initials&#125;</code><br/>
                                                Signature: <code>&#123;@Signature_Buyer:3:Full&#125;</code><br/>
                                                Date: <code>&#123;@Signature_Buyer:4:Date&#125;</code>
                                            </p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Two-Party Agreement</strong>
                                            <p>Buyer and Seller each sign and date. Each gets their own email link and signing flow.</p>
                                            <p>
                                                Buyer: <code>&#123;@Signature_Buyer:1:Full&#125;</code><br/>
                                                Buyer Date: <code>&#123;@Signature_Buyer:2:Date&#125;</code><br/>
                                                Seller: <code>&#123;@Signature_Seller:1:Full&#125;</code><br/>
                                                Seller Date: <code>&#123;@Signature_Seller:2:Date&#125;</code>
                                            </p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>With Effective Date</strong>
                                            <p>The signer picks an effective date (like a start date or closing date) before signing.</p>
                                            <p>
                                                Effective Date: <code>&#123;@Signature_Buyer:1:DatePick&#125;</code><br/>
                                                Signature: <code>&#123;@Signature_Buyer:2:Full&#125;</code>
                                            </p>
                                        </div>
                                    </div>

                                    <div class="card-tip info">
                                        <strong>Multi-Signer &amp; Packets</strong>
                                        <p>Use different role names for each signer. When sending, DocGen auto-detects roles from the template and populates the signer rows. You can also send <strong>multiple templates as a packet</strong> -- the signer walks through all documents in one session.</p>
                                    </div>
                                </section>

                                <section id="sig-flow" class="content-section">
                                    <h3 class="section-heading">The Signing Flow</h3>
                                    <p>Here is what each signer experiences when they receive a signature request.</p>

                                    <div class="step-visual">
                                        <div class="step-card">
                                            <div class="num">1</div>
                                            <strong>Email</strong>
                                            <p>Signer receives a branded email with a secure link.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">2</div>
                                            <strong>Verify</strong>
                                            <p>Enter email, receive a 6-digit PIN, verify identity.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">3</div>
                                            <strong>Guided Signing</strong>
                                            <p>The full document is shown with highlighted markers. An arrow points to each placement. Sign, initial, or date step by step.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">4</div>
                                            <strong>Consent</strong>
                                            <p>After all placements, check consent box and submit.</p>
                                        </div>
                                    </div>

                                    <div class="limit-grid">
                                        <div class="limit-card info">
                                            <strong>Resume Support</strong>
                                            <p>If a signer closes the browser, they can return to the same link within 48 hours and resume exactly where they left off. Each placement is saved individually.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Decline</strong>
                                            <p>Signers can decline with a reason. The sender is notified immediately via email.</p>
                                        </div>
                                        <div class="limit-card warning">
                                            <strong>Token Expiry</strong>
                                            <p>Signing links expire after <strong>48 hours</strong>. After 3 failed PIN attempts, the link is locked permanently.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Signing Order</strong>
                                            <p>Choose <strong>Parallel</strong> (all signers at once) or <strong>Sequential</strong> (one at a time -- next signer is notified after previous completes).</p>
                                        </div>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Sender Notifications</strong>
                                        <p>The sender receives email notifications when each signer completes, when all signatures are collected, and if anyone declines.</p>
                                    </div>
                                </section>

                                <section id="sig-verify" class="content-section">
                                    <h3 class="section-heading">Document Verification</h3>
                                    <p>Every signed PDF includes an Electronic Signature Certificate at the bottom with signer details and a verification URL.</p>

                                    <div class="limit-grid">
                                        <div class="limit-card info">
                                            <strong>Certificate on PDF</strong>
                                            <p>The certificate shows: Document ID, completion date, each signer's name, role, email, and email verification timestamp. It also includes the verification page URL.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Online Verification</strong>
                                            <p>The verify page (<code>/apex/DocGenVerify</code>) accepts a Document ID to show the full audit trail. It also has a file upload -- drag any PDF onto it to compute a SHA-256 hash and check if it matches a signed document.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Field History Tracking</strong>
                                            <p>All key audit fields (signer name, email, signed date, hash, IP, consent, PIN verification) have field history tracking enabled. If an admin modifies an audit record, Salesforce logs the change.</p>
                                        </div>
                                    </div>
                                </section>

                                <section id="sig-admin" class="content-section">
                                    <h3 class="section-heading">Signature Admin Setup</h3>
                                    <p>Complete these steps to enable signatures in your org.</p>

                                    <div class="pro-tip-box">
                                        <strong>Setup Checklist:</strong>
                                        <ol>
                                            <li><strong>Enable the Blob.toPdf() Release Update</strong> -- Go to Setup &gt; Release Updates and enable "Use the Visualforce PDF Rendering Service for Blob.toPdf() Invocations". This is REQUIRED for PDF generation -- both for documents and signed PDFs.</li>
                                            <li><strong>Create a Salesforce Site</strong> -- Setup &gt; Sites &gt; create a site pointing to <code>DocGenSignature</code> as the active page. This is the public page signers access.</li>
                                            <li><strong>Assign Guest Permissions</strong> -- Assign the <strong>DocGen Guest Signature</strong> permission set to the site's guest user profile. This grants access to signature Apex classes and objects.</li>
                                            <li><strong>Configure Email Branding</strong> -- Go to the <strong>Signatures</strong> tab in the Command Hub. Set your company name, brand color, logo URL, and customize the email subject/message.</li>
                                            <li><strong>Set the Site URL</strong> -- In Signature Settings, enter your site's base URL so signing links and verification URLs resolve correctly.</li>
                                            <li><strong>Assign User Permissions</strong> -- Users who create signature requests need the <strong>DocGen Admin</strong> or <strong>DocGen User</strong> permission set.</li>
                                        </ol>
                                    </div>

                                    <div class="card-tip info">
                                        <strong>Email Deliverability</strong>
                                        <p>Ensure your org's email deliverability is set to <strong>All Email</strong> (Setup &gt; Email &gt; Deliverability). PIN verification emails will not be delivered if this is set to System Email Only.</p>
                                    </div>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Object</th><th>Purpose</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><strong>DocGen Signature Request</strong></td><td>Parent record for a signing session. Links to a template and related record.</td></tr>
                                            <tr><td><strong>DocGen Signer</strong></td><td>One per signer per request. Tracks status, typed name, PIN verification, consent.</td></tr>
                                            <tr><td><strong>DocGen Signature Audit</strong></td><td>Immutable audit record created at signing time. IP, user agent, hash, consent, PIN timestamp.</td></tr>
                                        </tbody>
                                    </table>
                                </section>

                                <section id="generate-single" class="content-section">

                                    <div class="step-visual">
                                        <div class="step-card">
                                            <div class="num">1</div>
                                            <strong>Navigate</strong>
                                            <p>Go to any record page (Account, Opportunity, Contact, etc.).</p>

                                            <div class="num">2</div>
                                            <strong>Select</strong>
                                            <p>Find the Document Generator component and select a template from the dropdown.</p>

                                <section id="document-packets" class="content-section">
                                    <h3 class="section-heading">Document Packets</h3>
                                    <p>Generate multiple templates at once and merge them into a single PDF:</p>

                                    <div class="step-visual">
                                        <div class="step-card">
                                            <div class="num">1</div>
                                            <strong>Tab</strong>

                                <section id="pdf-merge" class="content-section">
                                    <h3 class="section-heading">PDF Merge &amp; Child Record PDFs</h3>
                                    <p>Five ways to combine PDFs:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Mode</th><th>What It Does</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><strong>Generate &amp; Merge</strong></td><td>Generate a doc, then append existing PDFs from the record</td></tr>
                                            <tr><td><strong>Document Packets</strong></td><td>Generate from multiple templates, merge into one PDF</td></tr>
                                            <tr><td><strong>Merge Only</strong></td><td>Combine existing PDFs on the record with drag-and-drop ordering</td></tr>
                                            <tr><td><strong>Child Record PDFs</strong></td><td>Pull PDFs from child records (e.g., all Opportunity PDFs under an Account)</td></tr>
                                            <tr><td><strong>Bulk Merge</strong></td><td>After bulk generation, merge all generated PDFs into one download</td></tr>
                                        </tbody>
                                    </table>

                                    <p>For <strong>Child Record PDFs</strong>: select the child relationship, optionally filter with a WHERE clause (e.g., <code>StageName = 'Closed Won'</code>), browse PDFs grouped by child record, select the ones you want, and merge.</p>

                                    <p>All merging runs client-side in your browser -- no server-side size limits on the merged output.</p>
                                </section>

                                <section id="bulk-generation" class="content-section">
                                    <h3 class="section-heading">Bulk Generation</h3>
                                    <p>Generate documents for hundreds of records at once from the Bulk Generation tab in the Command Hub.</p>

                                    <div class="step-visual">
                                        <div class="step-card">
                                            <div class="num">1</div>
                                            <strong>Template</strong>
                                            <p>Select a template and optionally preview with a sample record.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">2</div>
                                            <strong>Filter</strong>
                                            <p>Enter a SOQL WHERE clause. Click Validate to check syntax and see matching record count.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">3</div>
                                            <strong>Configure</strong>
                                            <p>Set batch size, output mode (individual files, merged packet, or both), and give it a name.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">4</div>
                                            <strong>Submit</strong>
                                            <p>Real-time progress tracking with auto-refresh. View results in Recent Jobs.</p>
                                        </div>
                                    </div>

                                    <div class="limit-grid">
                                        <div class="limit-card info">
                                            <strong>Saved Queries</strong>
                                            <p>Save frequently-used WHERE clauses with a name and description. Load them with one click when setting up future bulk jobs. Great for monthly invoices, quarterly reports, or any recurring generation task.</p>
                                        </div>
                                        <div class="limit-card info">
                                            <strong>Bulk Merge</strong>
                                            <p>After a bulk job completes, click the merge icon on the job row to download all generated PDFs combined into a single file.</p>
                                        </div>
                                    </div>
                                </section>

                                <section id="giant-query" class="content-section">
                                    <h3 class="section-heading">Giant Query (2,000+ Rows)</h3>
                                    <p>DocGen automatically detects large datasets and switches to batch processing. Same template, same button -- the complexity is invisible to the user.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th></th><th>Standard Engine</th><th>Giant Query Engine</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><strong>When</strong></td><td>&lt; 2,000 child records</td><td>&gt; 2,000 child records</td></tr>
                                            <tr><td><strong>Detection</strong></td><td>Automatic</td><td>Automatic</td></tr>
                                            <tr><td><strong>Speed</strong></td><td>2-5 seconds</td><td>1-5 minutes (async)</td></tr>
                                            <tr><td><strong>Output</strong></td><td>Download or save</td><td>Saved to record automatically</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Tested up to 28,000+ rows. Ideal for transaction logs, price books, audit trails, and bulk data reports. Uses cursor-based pagination (500 rows per page) so it never hits heap limits.</p>

                                    <div class="card-tip warning">
                                        <strong>Giant Query limitation:</strong> ORDER BY in child subqueries is not yet supported in Giant Query mode. Records will be returned in Salesforce's default order. If sort order matters, use the standard engine (under 2,000 rows) or sort in your template's table after generation.
                                    </div>
                                </section>

                                <!-- ============================================ -->
                                <!-- AUTOMATION -->
                                <!-- ============================================ -->

                                <section id="flow-actions" class="content-section">
                                    <h3 class="section-heading">Flow Actions</h3>
                                    <p>Three invocable actions for Salesforce Flow -- use in Record-Triggered Flows, Screen Flows, Scheduled Flows, and Subflows:</p>

                                    <div class="flow-card">
                                        <div class="flow-header">
                                            <lightning-icon icon-name="standard:flow" size="small" class="slds-var-m-right_x-small"></lightning-icon>
                                            <strong>Generate Document</strong>
                                        </div>
                                        <p><strong>Input:</strong> Template ID, Record ID. <strong>Output:</strong> Content Document ID.</p>
                                        <p>Generates a single document synchronously. Use for automating document creation on record events -- for example, auto-generate a welcome PDF when a new Contact is created.</p>
                                    </div>
                                    <div class="flow-card slds-var-m-top_medium">
                                        <div class="flow-header">
                                            <lightning-icon icon-name="standard:flow" size="small" class="slds-var-m-right_x-small"></lightning-icon>
                                            <strong>Generate Bulk Documents</strong>
                                        </div>
                                        <p><strong>Input:</strong> Template ID, WHERE Condition, Batch Size. <strong>Output:</strong> Job ID.</p>
                                        <p>Launches async batch generation. Returns a Job ID to poll for completion. Use in Scheduled Flows for recurring document generation (monthly invoices, quarterly reports).</p>
                                    </div>
                                    <div class="flow-card slds-var-m-top_medium">
                                        <div class="flow-header">
                                            <lightning-icon icon-name="standard:flow" size="small" class="slds-var-m-right_x-small"></lightning-icon>
                                            <strong>Giant Query Auto-Detect</strong>
                                        </div>
                                        <p><strong>Input:</strong> Template ID, Record ID. <strong>Output:</strong> Content Doc ID or Job ID.</p>
                                        <p>Auto-detects dataset size. Under 2K rows: generates sync. Over 2K: launches async batch. Ideal for Experience Cloud portals where dataset size is unknown.</p>
                                    </div>
                                </section>

                                <section id="apex-provider" class="content-section">
                                    <h3 class="section-heading">Custom Apex Data Provider</h3>
                                    <p>For advanced use cases, implement the <code>DocGenDataProvider</code> interface to supply custom data from external APIs, computed fields, or cross-object aggregations. Select "Apex Provider" as the query type in the template configuration and specify your class name.</p>
                                </section>

                                <!-- ============================================ -->
                                <!-- ADMIN -->
                                <!-- ============================================ -->

                                <section id="permissions" class="content-section">
                                    <h3 class="section-heading">Permissions &amp; Sharing</h3>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Permission Set</th><th>Who</th><th>Access</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><strong>DocGen Admin</strong></td><td>Template builders, admins</td><td>Full access -- create, edit, delete templates, bulk generate</td></tr>
                                            <tr><td><strong>DocGen User</strong></td><td>End users</td><td>Generate documents, use templates (no admin)</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Field-level security is enforced -- users only see fields they have permission to read. Record sharing follows standard Salesforce rules. Generated files are visible to anyone with access to the record.</p>

                                    <p>Template access uses standard Salesforce sharing -- sharing rules, manual sharing, and role hierarchy. No custom sharing UI needed.</p>
                                </section>

                                <section id="governor-limits" class="content-section">
                                    <h3 class="section-heading">Governor Limits</h3>
                                    <p>DocGen is designed to work within Salesforce governor limits. Here's how it handles them:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Limit</th><th>How DocGen Handles It</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><strong>6 MB heap (sync)</strong></td><td>DOCX uses client-side assembly; PDF uses zero-heap image pipeline</td></tr>
                                            <tr><td><strong>12 MB heap (async)</strong></td><td>Bulk generation uses batch size 1 = fresh heap per record</td></tr>
                                            <tr><td><strong>~3 MB PDF save</strong></td><td>Download has no size limit; only saving to record has this cap</td></tr>
                                            <tr><td><strong>4 MB Aura payload</strong></td><td>Download works for any size DOCX; saving has this limit</td></tr>
                                            <tr><td><strong>100 SOQL queries</strong></td><td>Multi-level queries use 1 SOQL per relationship depth</td></tr>
                                            <tr><td><strong>50,000+ child records</strong></td><td>Giant Query auto-detected, processed async with cursor pagination</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>Tip:</strong> If bulk generation is slow, reduce batch size to 1. Each batch gets a fresh heap limit, so complex templates with images or many child records process reliably.
                                    </div>
                                </section>

                                <section id="known-limitations" class="content-section">
                                    <h3 class="section-heading">Known Limitations</h3>
                                    <p>These are things DocGen does <strong>not</strong> support. Most are Salesforce platform constraints, not DocGen bugs.</p>

                                    <p><strong>PDF Output -- What Doesn't Work</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Does NOT Work</th><th>Why</th><th>Workaround</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Custom fonts (Calibri, branded typefaces)</td><td><code>Blob.toPdf()</code> only has 4 built-in fonts</td><td>Generate as DOCX</td></tr>
                                            <tr><td><code>@font-face</code> CSS</td><td>Not supported by the PDF renderer</td><td>Generate as DOCX</td></tr>
                                            <tr><td>Text boxes and Word shapes</td><td>Drawing objects aren't converted to HTML</td><td>Use tables for layout</td></tr>
                                            <tr><td>SmartArt and charts</td><td>Not rendered in the HTML conversion</td><td>Insert as a static image in your template</td></tr>
                                            <tr><td>Clickable hyperlinks</td><td>PDF renderer outputs styled text, not real links</td><td>Links work in DOCX output</td></tr>
                                            <tr><td>CSS Grid / Flexbox</td><td>PDF renderer only supports CSS 2.1</td><td>Use tables</td></tr>
                                            <tr><td>JavaScript in templates</td><td>Ignored by the renderer</td><td>N/A</td></tr>
                                            <tr><td>Even/odd page headers</td><td>Not currently supported</td><td>Same header on all pages</td></tr>
                                            <tr><td>Multiple section-specific headers</td><td>One header/footer set per document</td><td>Use page breaks, not section-specific headers</td></tr>
                                            <tr><td>Multi-column layouts</td><td>CSS columns not supported by the PDF engine</td><td>Use tables for column layouts</td></tr>
                                        </tbody>
                                    </table>

                                    <p><strong>DOCX Output -- What Doesn't Work</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Does NOT Work</th><th>Why</th><th>Workaround</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Barcodes and QR codes</td><td>These are rendered as CSS in the PDF pipeline only</td><td>Generate as PDF for barcodes/QR</td></tr>
                                            <tr><td>Rich text images</td><td>Images inside Rich Text Area fields don't carry into DOCX</td><td>Use <code>&#123;%Field&#125;</code> image tags or generate as PDF</td></tr>
                                            <tr><td>Dynamic page numbers</td><td>PAGE/NUMPAGES are PDF-only features</td><td>Word handles page numbers natively -- add them in Word's header</td></tr>
                                        </tbody>
                                    </table>

                                    <p><strong>Excel &amp; PowerPoint -- What Doesn't Work</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Does NOT Work</th><th>Notes</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>PDF output</td><td>Excel and PowerPoint output in their native format only (.xlsx, .pptx)</td></tr>
                                            <tr><td>Images</td><td>Dynamic images and barcodes are Word/PDF only</td></tr>
                                            <tr><td>Rich text formatting</td><td>Rich text fields are stripped to plain text in PowerPoint</td></tr>
                                            <tr><td>Headers and footers</td><td>Headers/footers are a Word/PDF feature</td></tr>
                                        </tbody>
                                    </table>

                                    <p><strong>General Limitations</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Limitation</th><th>Details</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>~3 MB PDF save limit</td><td>Saving a PDF to a record is capped at ~3 MB by Salesforce. Download has no limit. Use Download for large PDFs.</td></tr>
                                            <tr><td>4 MB Aura payload limit</td><td>Saving a DOCX to a record is capped at 4 MB. Download works for any size.</td></tr>
                                            <tr><td>RTL text wrapping</td><td>Long Hebrew/Arabic paragraphs that wrap to multiple lines may have continuation lines starting from the left.</td></tr>
                                            <tr><td>No live preview before generating</td><td>You generate the document to see results. Use the sample record preview on step 2 to verify your query returns the right data.</td></tr>
                                            <tr><td>Giant Query: no ORDER BY</td><td>ORDER BY in child subqueries is not yet supported when Giant Query mode activates (2,000+ rows). Standard engine supports ORDER BY.</td></tr>
                                            <tr><td>One header/footer set</td><td>PDFs support one header and one footer across the entire document. "Different First Page" is supported (cover pages), but section-specific headers are not.</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>Rule of thumb:</strong> If something doesn't work in PDF, try DOCX. If it doesn't work in DOCX, try PDF. Between the two formats, most use cases are covered.
                                    </div>
                                </section>

                                <section id="troubleshooting" class="content-section">
                                    <h3 class="section-heading">Troubleshooting</h3>

                                    <div class="card-tip">
                                        <strong>PDF shows raw CSS text instead of formatted content</strong>
                                        <p>Enable the <strong>Blob.toPdf() Release Update</strong> in Setup &gt; Release Updates. This is the most common issue and the first thing to check.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Images appear broken in PDF</strong>
                                        <p>Make sure the image field contains a ContentVersion ID (starts with <code>068</code>). The file must be committed (not just uploaded) in Salesforce Files.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Fields show as blank in output</strong>
                                        <p>Check that the field is included in the template's query configuration (step 2) and that the running user has FLS access to the field. Open the template, go to step 2, and verify the field is in the query.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Bulk generation is slow or hitting limits</strong>
                                        <p>Reduce batch size to 1 for complex templates with images or many child records. Each batch gets a fresh 12 MB heap limit.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Page numbers not showing in PDF</strong>
                                        <p>Use Word's built-in Insert &gt; Page Number feature (not typed text). DocGen detects the PAGE and NUMPAGES field codes automatically.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Hebrew/Arabic text is blank in PDF</strong>
                                        <p>Ensure the Word template has RTL paragraph properties set (<code>&lt;w:bidi/&gt;</code>). DocGen auto-detects RTL and applies Arial Unicode MS font. Generate as DOCX if the PDF engine can't render specific glyphs.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Custom fonts look different in PDF</strong>
                                        <p>This is expected. PDF output only supports Helvetica, Times, Courier, and Arial Unicode MS. All other fonts fall back to Helvetica. Generate as DOCX if you need branded fonts.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Cover page has headers/footers showing</strong>
                                        <p>In Word, go to Layout &gt; check "Different First Page". This tells DocGen to suppress headers and footers on page 1.</p>
                                    </div>
                                </section>
