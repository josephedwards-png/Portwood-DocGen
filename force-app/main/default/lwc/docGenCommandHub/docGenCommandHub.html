                                    <div class="card-tip">
                                        <strong>What is DocGen?</strong>

                                <section id="installation" class="content-section">
                                    <h3 class="section-heading">Installation &amp; Setup</h3>
                                    <div class="step-visual">
                                        <div class="step-card">
                                            <div class="num">1</div>
                                            <strong>Install</strong>
                                            <p>Install the package from the landing page or GitHub. Choose "Install for Admins Only" to start.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">2</div>
                                            <strong>Permissions</strong>
                                            <p>Go to Setup &gt; Permission Sets and assign <strong>DocGen Admin</strong> or <strong>DocGen User</strong> to your users.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">3</div>
                                            <strong>Release Update</strong>
                                            <p>Go to Setup &gt; Release Updates and enable "Use the Visualforce PDF Rendering Service for Blob.toPdf() Invocations".</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">4</div>
                                            <strong>Add Component</strong>
                                            <p>Edit any Lightning Record Page, drag the <code>docGenRunner</code> component onto the layout, save and activate.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">5</div>
                                            <strong>Open App</strong>
                                            <p>Use the App Launcher to find "DocGen" -- this is the Command Hub where admins create and manage templates.</p>
                                        </div>
                                    </div>

                                    <div class="card-tip warning">
                                        <strong>Required:</strong> The Blob.toPdf() Release Update must be enabled for PDF generation. Without it, PDFs render incorrectly. This is opt-in until Summer '26 when Salesforce enforces it for all orgs.
                                    </div>
                                </section>

                                    <h3 class="section-heading">Quick Start</h3>

                                            <strong>Create</strong>
                                            <p>In the DocGen app, click Create New. Name it, choose your object, and select a sample record for preview.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">2</div>
                                            <strong>Query</strong>
                                            <p>Type your SOQL in the editor. Add merge tags to your Word file: <code>&#123;Name&#125;</code>, <code>&#123;Account.Name&#125;</code>, <code>&#123;#Contacts&#125;&#123;FirstName&#125;&#123;/Contacts&#125;</code>.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">3</div>
                                            <strong>Upload</strong>
                                            <p>Upload a <code>.docx</code>, <code>.xlsx</code>, or <code>.pptx</code> file containing your merge tags. Use the Copy-Paste Tags panel to see all available tags.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">4</div>
                                            <strong>Generate</strong>

                                <!-- TEMPLATES -->
                                <!-- ============================================ -->

                                <section id="creating-templates" class="content-section">
                                    <h3 class="section-heading">Creating Templates</h3>
                                    <p>Templates are created in the DocGen Command Hub (the DocGen app tab). The wizard walks you through three steps:</p>

                                    <div class="card-tip">
                                        <strong>Step 1 -- Name &amp; Configure</strong>
                                        <p>Give your template a name, select the type (Word, Excel, or PowerPoint), choose the output format (PDF or Native), and pick the base Salesforce object. Optionally select a sample record -- this powers the live data preview on step 2. You can also add a category and description for organization.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Step 2 -- Build Your Query</strong>
                                        <p>Type your SOQL query directly in the editor. As you type, inline autocomplete suggests fields from the object schema. Type <code>Owner.</code> to see User fields, type <code>(</code> to see child relationships. You can also paste a full SOQL statement -- DocGen automatically strips the <code>SELECT ... FROM</code> wrapper and keeps just the field list.</p>
                                        <p>If you selected a sample record on step 1, a live preview tree appears showing real values from your query: field names with actual data, child records in mini-tables.</p>
                                    </div>

                                    <div class="card-tip">
                                        <strong>Step 3 -- Upload Your File</strong>
                                        <p>Upload a <code>.docx</code>, <code>.xlsx</code>, or <code>.pptx</code> file containing merge tags. The <strong>Copy-Paste Tags</strong> panel shows all available tags from your query -- including nested child and grandchild fields at every level. Click any tag to copy it, then paste into your template file.</p>
                                    </div>

                                    <div class="card-tip info">
                                        <strong>Tip:</strong> Set a <strong>Document Title Format</strong> in the template settings to auto-name generated files. Use merge tags like <code>Invoice_&#123;Name&#125;_&#123;CloseDate&#125;</code>. The generated file will be named using real data from the record.
                                    </div>
                                </section>

                                <section id="query-builder" class="content-section">
                                    <h3 class="section-heading">Query Builder</h3>
                                    <p>The query builder is a manual-first SOQL editor with smart suggestions. Type your query directly -- no drag-and-drop, no multi-panel UI.</p>

                                    <ul class="bullet-list">
                                        <li><strong>Inline Autocomplete</strong> -- Start typing a field name and suggestions appear from the object schema. Click to insert with auto-comma formatting.</li>
                                        <li><strong>Context-Aware</strong> -- Type <code>Owner.</code> and it loads User fields. Type <code>(</code> and it shows child relationships. Inside a subquery like <code>(SELECT ... FROM Contacts)</code>, it suggests Contact fields.</li>
                                        <li><strong>Paste Full SOQL</strong> -- Paste a complete <code>SELECT ... FROM ... WHERE</code> statement directly. DocGen auto-strips the SELECT/FROM wrapper and keeps the field list.</li>
                                        <li><strong>Nested Subqueries</strong> -- Build multi-level relationships at any depth: Account &gt; Opportunities &gt; Line Items &gt; Schedules.</li>
                                        <li><strong>Parent Lookups</strong> -- Use dot notation for related fields: <code>Account.Name</code>, <code>Owner.Email</code>, <code>Account.Owner.Name</code></li>
                                        <li><strong>Child Subqueries</strong> -- Add subqueries with optional WHERE, ORDER BY, and LIMIT: <code>(SELECT FirstName, LastName FROM Contacts WHERE Active__c = true ORDER BY LastName LIMIT 100)</code></li>
                                        <li><strong>Sample Record Preview</strong> -- Pick a sample record on step 1, and step 2 shows real values from your query in a structured tree with child records in mini-tables.</li>
                                        <li><strong>Trailing Comma Cleanup</strong> -- Trailing commas are auto-stripped when clicking Next.</li>
                                    </ul>
                                </section>

                                <section id="template-formats" class="content-section">
                                    <h3 class="section-heading">Template Formats</h3>
                                    <p>DocGen supports three template formats. Word is the most capable.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Format</th><th>Template File</th><th>Output Options</th><th>Best For</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><strong>Word</strong></td><td><code>.docx</code></td><td>PDF or DOCX</td><td>Contracts, proposals, invoices, letters</td></tr>
                                            <tr><td><strong>Excel</strong></td><td><code>.xlsx</code></td><td>XLSX</td><td>Data exports, reports, financial summaries</td></tr>
                                            <tr><td><strong>PowerPoint</strong></td><td><code>.pptx</code></td><td>PPTX</td><td>Presentations, slide decks</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Word is the only format that supports images, barcodes, QR codes, rich text, headers/footers, and PDF output. Excel and PowerPoint support all merge tags and formatting but output in their native format only.</p>
                                </section>

                                <section id="versioning" class="content-section">
                                    <h3 class="section-heading">Template Versioning</h3>
                                    <p>Every time you upload a new file, a new version is created. You can view version history, download any version, and restore a previous version at any time. The most recent upload is always the active version.</p>
                                </section>

                                <section id="import-export" class="content-section">
                                    <h3 class="section-heading">Import &amp; Export Templates</h3>
                                    <p>Move templates between orgs using the portable <code>.docgen.json</code> format:</p>

                                    <ul class="bullet-list">
                                        <li><strong>Export:</strong> Click the row action menu on any template &gt; Export. Downloads a JSON file with all metadata, query config, and the template file.</li>
                                        <li><strong>Import:</strong> Click Import Template in the Command Hub, upload the JSON file. The template is recreated with all settings intact.</li>
                                    </ul>

                                    <div class="card-tip info">
                                        <strong>Tip:</strong> This is the easiest way to move templates from sandbox to production, or to share templates with other orgs.
                                    </div>
                                </section>

                                <!-- ============================================ -->
                                <!-- MERGE TAGS -->
                                <!-- ============================================ -->

                                <section id="field-tags" class="content-section">
                                    <h3 class="section-heading">Field Tags</h3>
                                    <p>Place tags in your Word, Excel, or PowerPoint template. DocGen replaces them with live Salesforce data at generation time.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type in Template</th><th>What Appears in Output</th><th>Notes</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;Name&#125;</code></td><td>Acme Corporation</td><td>Standard field</td></tr>
                                            <tr><td><code>&#123;Email&#125;</code></td><td>john@acme.com</td><td>Any standard field</td></tr>
                                            <tr><td><code>&#123;Phone&#125;</code></td><td>(317) 555-0100</td><td>Phone fields</td></tr>
                                            <tr><td><code>&#123;Custom_Field__c&#125;</code></td><td>Gold Tier</td><td>Custom fields use API name</td></tr>
                                            <tr><td><code>&#123;CreatedDate&#125;</code></td><td>2026-03-18T14:30:00.000Z</td><td>Raw date (add format -- see below)</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>Tip:</strong> The tag inherits whatever font, size, color, and style you apply to it in your Word template. If you make <code>&#123;Name&#125;</code> bold and 14pt in your file, the output value will be bold and 14pt.
                                    </div>
                                </section>

                                <section id="parent-lookups" class="content-section">
                                    <h3 class="section-heading">Parent Lookups</h3>
                                    <p>Pull data from related records using dot notation. Add these fields in your query on step 2 (e.g., <code>Account.Name, Owner.Email</code>).</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What It Fetches</th><th>Example Output</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;Account.Name&#125;</code></td><td>Parent Account name</td><td>Acme Corporation</td></tr>
                                            <tr><td><code>&#123;Owner.Email&#125;</code></td><td>Record owner's email</td><td>dave@company.com</td></tr>
                                            <tr><td><code>&#123;Account.Owner.Name&#125;</code></td><td>Account's owner (2 levels up)</td><td>Dave Moudy</td></tr>
                                            <tr><td><code>&#123;CreatedBy.Name&#125;</code></td><td>Who created the record</td><td>Admin User</td></tr>
                                            <tr><td><code>&#123;Account.BillingCity&#125;</code></td><td>Parent's billing city</td><td>Indianapolis</td></tr>
                                        </tbody>
                                    </table>

                                    <p>You can go multiple levels deep -- just make sure each level is in your query: <code>Account.Name, Account.Owner.Name, Account.Owner.Email</code></p>
                                </section>

                                <section id="child-loops" class="content-section">
                                    <h3 class="section-heading">Child Record Loops</h3>
                                    <p>Repeat a section of your document for each child record. Use <code>&#123;#RelationshipName&#125;</code> to start the loop and <code>&#123;/RelationshipName&#125;</code> to end it. The relationship name matches your SOQL subquery.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type in Template</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;#Contacts&#125;</code><br/>Name: <code>&#123;FirstName&#125;</code> <code>&#123;LastName&#125;</code> -- <code>&#123;Title&#125;</code><br/><code>&#123;/Contacts&#125;</code></td></tr>
                                        </tbody>
                                    </table>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What Appears in Output (3 Contacts)</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Name: John Smith -- VP Sales<br/>Name: Sarah Johnson -- CEO<br/>Name: Mike Chen -- CTO</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Everything between <code>&#123;#Contacts&#125;</code> and <code>&#123;/Contacts&#125;</code> repeats once per child record. This works with paragraphs, bullet points, table rows -- any content block.</p>
                                </section>

                                <section id="repeating-tables" class="content-section">
                                    <h3 class="section-heading">Repeating Table Rows</h3>
                                    <p>The most common use of child loops. Put <code>&#123;#ChildName&#125;</code> in the first cell and <code>&#123;/ChildName&#125;</code> in the last cell of the <strong>same data row</strong>. The header row stays fixed.</p>

                                    <p><strong>What you type in your Word template:</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Product</th><th>Quantity</th><th>Unit Price</th><th>Total</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;#OpportunityLineItems&#125;&#123;Name&#125;</code></td><td><code>&#123;Quantity&#125;</code></td><td><code>&#123;UnitPrice:currency&#125;</code></td><td><code>&#123;TotalPrice:currency&#125;&#123;/OpportunityLineItems&#125;</code></td></tr>
                                        </tbody>
                                    </table>

                                    <p><strong>What appears in the generated document:</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Product</th><th>Quantity</th><th>Unit Price</th><th>Total</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Enterprise License</td><td>10</td><td>$5,000.00</td><td>$50,000.00</td></tr>
                                            <tr><td>Implementation Services</td><td>1</td><td>$15,000.00</td><td>$15,000.00</td></tr>
                                            <tr><td>Annual Support</td><td>10</td><td>$1,000.00</td><td>$10,000.00</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>Key rule:</strong> The opening tag <code>&#123;#...&#125;</code> goes in the <strong>first cell</strong> and the closing tag <code>&#123;/...&#125;</code> goes in the <strong>last cell</strong> of the same row. The header row is never touched. All table formatting (borders, shading, column widths) carries through to every generated row.
                                    </div>
                                </section>

                                <section id="conditionals" class="content-section">
                                    <h3 class="section-heading">Conditional Sections</h3>
                                    <p>Show or hide content based on a field value. Same syntax as loops, but with a boolean or text field instead of a child relationship.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>When It Shows</th><th>When It's Hidden</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;#IsActive&#125;Active customer&#123;/IsActive&#125;</code></td><td>Field is <strong>true</strong></td><td>Field is <strong>false</strong></td></tr>
                                            <tr><td><code>&#123;#Description&#125;See notes: &#123;Description&#125;&#123;/Description&#125;</code></td><td>Field has a value</td><td>Field is blank/null</td></tr>
                                            <tr><td><code>&#123;#HasDiscount&#125;Discount applied!&#123;/HasDiscount&#125;</code></td><td>Checkbox is checked</td><td>Checkbox is unchecked</td></tr>
                                        </tbody>
                                    </table>

                                    <p>The entire block -- including any text, tables, or images between the tags -- is removed from the output when the condition is false or blank.</p>

                                    <h4>Else Blocks</h4>
                                    <p>Use <code>&#123;:else&#125;</code> inside a conditional to show alternative content when the condition is false:</p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>Output (true)</th><th>Output (false/blank)</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;#IsActive&#125;Active&#123;:else&#125;Inactive&#123;/IsActive&#125;</code></td><td>Active</td><td>Inactive</td></tr>
                                            <tr><td><code>&#123;#Industry&#125;Sector: &#123;Industry&#125;&#123;:else&#125;No industry on file&#123;/Industry&#125;</code></td><td>Sector: Technology</td><td>No industry on file</td></tr>
                                        </tbody>
                                    </table>

                                    <h4>Inverse Conditionals</h4>
                                    <p>Use <code>&#123;^Field&#125;</code> (caret instead of hash) to show content only when a field is <strong>false, blank, or null</strong>:</p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>When It Shows</th><th>When It's Hidden</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;^HasDiscount&#125;No discount applied&#123;/HasDiscount&#125;</code></td><td>Field is <strong>false</strong> or blank</td><td>Field is <strong>true</strong></td></tr>
                                            <tr><td><code>&#123;^Email&#125;No email on file&#123;/Email&#125;</code></td><td>Email is <strong>blank/null</strong></td><td>Email has a value</td></tr>
                                        </tbody>
                                    </table>
                                    <p>Inverse conditionals also support <code>&#123;:else&#125;</code> blocks.</p>
                                </section>

                                <section id="comparisons" class="content-section">
                                    <h3 class="section-heading">Comparisons (IF / ELSE)</h3>
                                    <p>Compare a field against a specific value using <code>&#123;#IF Field operator Value&#125;</code>. Supports both string and numeric comparisons.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>Output</th><th>Operator</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;#IF Industry = Technology&#125;Tech partner&#123;/IF&#125;</code></td><td>Tech partner</td><td>Equals</td></tr>
                                            <tr><td><code>&#123;#IF Amount &gt; 50000&#125;Premium&#123;:else&#125;Standard&#123;/IF&#125;</code></td><td>Premium or Standard</td><td>Greater than</td></tr>
                                            <tr><td><code>&#123;#IF Status != Closed&#125;Still open&#123;/IF&#125;</code></td><td>Still open</td><td>Not equals</td></tr>
                                            <tr><td><code>&#123;#IF Quantity &gt;= 100&#125;Bulk order&#123;/IF&#125;</code></td><td>Bulk order</td><td>Greater or equal</td></tr>
                                        </tbody>
                                    </table>
                                    <p><strong>Supported operators:</strong> <code>=</code> <code>!=</code> <code>&gt;</code> <code>&lt;</code> <code>&gt;=</code> <code>&lt;=</code> -- Numeric comparison is attempted first; falls back to string comparison.</p>
                                </section>

                                <section id="formatting" class="content-section">
                                    <h3 class="section-heading">Date &amp; Number Formatting</h3>
                                    <p>Add a format specifier after a colon to control how values display:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Appears</th><th>Format Type</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;CloseDate:MM/dd/yyyy&#125;</code></td><td>03/18/2026</td><td>US date pattern</td></tr>
                                            <tr><td><code>&#123;CloseDate:dd/MM/yyyy&#125;</code></td><td>18/03/2026</td><td>International date pattern</td></tr>
                                            <tr><td><code>&#123;CreatedDate:MMMM d, yyyy&#125;</code></td><td>March 18, 2026</td><td>Long date pattern</td></tr>
                                            <tr><td><code>&#123;Amount:currency&#125;</code></td><td>$500,000.00</td><td>Currency (USD default)</td></tr>
                                            <tr><td><code>&#123;Rate:percent&#125;</code></td><td>15.5%</td><td>Percentage</td></tr>
                                            <tr><td><code>&#123;Quantity:number&#125;</code></td><td>1,234</td><td>Number with commas</td></tr>
                                            <tr><td><code>&#123;Price:#,##0.00&#125;</code></td><td>1,234.56</td><td>Custom decimal format</td></tr>
                                            <tr><td><code>&#123;IsActive:checkbox&#125;</code></td><td>[X] or [ ]</td><td>Checkbox (true/false)</td></tr>
                                        </tbody>
                                    </table>
                                    <p><strong>Checkbox format</strong> renders <code>[X]</code> for truthy values and <code>[ ]</code> for false/blank. Use it inline: <code>Active: &#123;IsActive:checkbox&#125;  Discount: &#123;HasDiscount:checkbox&#125;</code></p>

                                    <h4 class="subsection-heading">International Currency &amp; Locale Formatting</h4>
                                    <p>For global documents, add an ISO currency code and/or locale after the format keyword. This lets you control currency symbols, number separators, and date layouts per-tag:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Appears</th><th>Notes</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td colspan="3" class="table-group-header"><strong>Currency with ISO Code</strong></td></tr>
                                            <tr><td><code>&#123;Amount:currency:EUR&#125;</code></td><td>&euro;1,234.56</td><td>Euro symbol, your locale's separators</td></tr>
                                            <tr><td><code>&#123;Amount:currency:GBP&#125;</code></td><td>&pound;1,234.56</td><td>British Pound</td></tr>
                                            <tr><td><code>&#123;Amount:currency:JPY&#125;</code></td><td>&yen;1,235</td><td>Japanese Yen (no decimals)</td></tr>
                                            <tr><td><code>&#123;Amount:currency:INR&#125;</code></td><td>&#8377;1,234.56</td><td>Indian Rupee</td></tr>
                                            <tr><td><code>&#123;Amount:currency:CHF&#125;</code></td><td>CHF 1,234.56</td><td>Swiss Franc</td></tr>
                                            <tr><td colspan="3" class="table-group-header"><strong>Currency with ISO Code + Locale</strong></td></tr>
                                            <tr><td><code>&#123;Amount:currency:EUR:de_DE&#125;</code></td><td>1.234,56 &euro;</td><td>German style: dot thousands, comma decimal, symbol after</td></tr>
                                            <tr><td><code>&#123;Amount:currency:GBP:en_GB&#125;</code></td><td>&pound;1,234.56</td><td>British English formatting</td></tr>
                                            <tr><td><code>&#123;Amount:currency:BRL:pt_BR&#125;</code></td><td>1.234,56 R$</td><td>Brazilian Real in Portuguese format</td></tr>
                                            <tr><td colspan="3" class="table-group-header"><strong>Numbers with Locale</strong></td></tr>
                                            <tr><td><code>&#123;Quantity:number:de_DE&#125;</code></td><td>1.234.567</td><td>German: dots as thousands separators</td></tr>
                                            <tr><td><code>&#123;Quantity:number:fr_FR&#125;</code></td><td>1.234.567</td><td>French: dots as thousands separators</td></tr>
                                            <tr><td colspan="3" class="table-group-header"><strong>Percentages with Locale</strong></td></tr>
                                            <tr><td><code>&#123;Rate:percent:de_DE&#125;</code></td><td>15,5%</td><td>German: comma as decimal separator</td></tr>
                                            <tr><td colspan="3" class="table-group-header"><strong>Dates with Locale</strong></td></tr>
                                            <tr><td><code>&#123;CloseDate:date&#125;</code></td><td><em>(your locale's default)</em></td><td>Auto-detects from running user's locale</td></tr>
                                            <tr><td><code>&#123;CloseDate:date:de_DE&#125;</code></td><td>18.03.2026</td><td>German date format (dd.MM.yyyy)</td></tr>
                                            <tr><td><code>&#123;CloseDate:date:ja_JP&#125;</code></td><td>2026/03/18</td><td>Japanese date format (yyyy/MM/dd)</td></tr>
                                            <tr><td><code>&#123;CloseDate:date:en_GB&#125;</code></td><td>18/03/2026</td><td>British date format (dd/MM/yyyy)</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>Supported currencies:</strong> USD, EUR, GBP, JPY, CNY, CHF, CAD, AUD, INR, KRW, BRL, MXN, SEK, NOK, DKK, PLN, CZK, HUF, TRY, ZAR, SGD, HKD, NZD, THB, MYR, PHP, IDR, TWD, ILS, RUB, NGN, KES, AED, SAR, COP, CLP, PEN, ARS, EGP, GHS
                                    </div>

                                    <div class="card-tip info">
                                        <strong>Supported locales:</strong> en_US, en_GB, en_AU, de_DE, de_CH, fr_FR, fr_CH, es_ES, it_IT, pt_BR, nl_NL, da_DK, sv_SE, nb_NO, ja_JP, zh_CN, ko_KR, ru_RU, pl_PL, cs_CZ, hu_HU, tr_TR, ro_RO, el_GR, uk_UA, id_ID, vi_VN, and more. When no locale is specified, the running user's Salesforce locale is used for the <code>:date</code> keyword.
                                    </div>

                                    <p><strong>How it works:</strong> The base tag (<code>:currency</code>, <code>:number</code>, <code>:percent</code>) without any locale uses US-style formatting for backward compatibility. Add an ISO currency code to change the symbol. Add a locale code to change the number separators and symbol placement. The <code>:date</code> keyword uses the running user's locale by default, or an explicit locale if provided.</p>

                                    <h4 class="subsection-heading">Built-in Date &amp; Time Tags</h4>
                                    <p>Two special merge tags resolve to the current date or time without needing a formula field. They accept the same format suffixes as any date field, so locale and custom patterns all work:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Appears</th><th>Notes</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;Today&#125;</code></td><td>2026-04-20</td><td>Current date in default ISO format</td></tr>
                                            <tr><td><code>&#123;Today:MM/dd/yyyy&#125;</code></td><td>04/20/2026</td><td>Current date, custom pattern</td></tr>
                                            <tr><td><code>&#123;Today:MMMM d, yyyy&#125;</code></td><td>April 20, 2026</td><td>Long date pattern</td></tr>
                                            <tr><td><code>&#123;Today:date&#125;</code></td><td><em>(running user's locale default)</em></td><td>Auto-detects user's Salesforce locale</td></tr>
                                            <tr><td><code>&#123;Today:date:de_DE&#125;</code></td><td>20.04.2026</td><td>Explicit locale override</td></tr>
                                            <tr><td><code>&#123;Now&#125;</code></td><td>2026-04-20 14:30:00</td><td>Current date + time</td></tr>
                                            <tr><td><code>&#123;Now:yyyy-MM-dd HH:mm&#125;</code></td><td>2026-04-20 14:30</td><td>Custom datetime pattern</td></tr>
                                            <tr><td><code>&#123;Now:date:ja_JP&#125;</code></td><td>2026/04/20</td><td>Now formatted as a Japanese-locale date</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>When to use:</strong> Stamp a "Generated on" line in a footer, time-stamp an invoice, add the current date to a contract header. Works in sync and giant-query PDFs, bulk generation, and e-signature stamped documents.
                                    </div>
                                </section>

                                <section id="aggregates" class="content-section">
                                    <h3 class="section-heading">Aggregates (SUM, COUNT, AVG)</h3>
                                    <p>Compute totals from child record lists. Place these <strong>outside</strong> the loop -- typically below a table of line items.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Appears</th><th>How It Works</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;SUM:OpportunityLineItems.TotalPrice:currency&#125;</code></td><td>$75,000.00</td><td>Adds up TotalPrice from all line items</td></tr>
                                            <tr><td><code>&#123;COUNT:Contacts&#125;</code></td><td>3</td><td>Number of child Contacts</td></tr>
                                            <tr><td><code>&#123;AVG:OpportunityLineItems.UnitPrice:currency&#125;</code></td><td>$7,000.00</td><td>Average unit price across line items</td></tr>
                                            <tr><td><code>&#123;MIN:OpportunityLineItems.Quantity&#125;</code></td><td>1</td><td>Smallest quantity</td></tr>
                                            <tr><td><code>&#123;MAX:OpportunityLineItems.Quantity&#125;</code></td><td>10</td><td>Largest quantity</td></tr>
                                        </tbody>
                                    </table>

                                    <p>The pattern is <code>&#123;FUNCTION:RelationshipName.FieldName&#125;</code>. Add <code>:currency</code> or <code>:number</code> at the end for formatting. Locale-aware formats work here too: <code>&#123;SUM:OpportunityLineItems.TotalPrice:currency:EUR&#125;</code> or <code>&#123;SUM:OpportunityLineItems.TotalPrice:currency:EUR:de_DE&#125;</code>.</p>

                                    <div class="card-tip info">
                                        <strong>Zero extra SOQL</strong> -- aggregates are computed from child data already in memory. No additional queries needed.
                                    </div>

                                    <p><strong>Full invoice example putting it all together:</strong></p>
                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;#OpportunityLineItems&#125;&#123;Name&#125;</code></td><td><code>&#123;Quantity&#125;</code></td><td><code>&#123;UnitPrice:currency&#125;</code></td><td><code>&#123;TotalPrice:currency&#125;&#123;/OpportunityLineItems&#125;</code></td></tr>
                                            <tr><td colspan="3"><strong>Grand Total:</strong></td><td><code>&#123;SUM:OpportunityLineItems.TotalPrice:currency&#125;</code></td></tr>
                                        </tbody>
                                    </table>
                                </section>

                                <section id="images" class="content-section">
                                    <h3 class="section-heading">Dynamic Images</h3>

                                    <h4 style="margin-top:1rem;">Option 1: Record-attached images (easiest)</h4>
                                    <p>The <code>&#123;%Image:N&#125;</code> tag renders the <strong>Nth oldest image attached to the current record</strong>. No field setup required -- just drag a photo onto the record in Files, and the tag picks it up. Filters to PNG/JPG/GIF/SVG/WEBP automatically (non-image attachments are skipped).</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Happens</th><th>Use Case</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;%Image:1&#125;</code></td><td>First image attached to the record, natural size</td><td>Single photo (headshot, logo)</td></tr>
                                            <tr><td><code>&#123;%Image:1:200&#125;</code></td><td>Same, max 200px in either dimension (keeps aspect)</td><td>Reasonable default size</td></tr>
                                            <tr><td><code>&#123;%Image:1:200x200&#125;</code></td><td>Explicit 200px × 200px</td><td>Square thumbnail</td></tr>
                                            <tr><td><code>&#123;%Image:1:400x&#125;</code></td><td>400px wide, auto height</td><td>Fixed-width banner</td></tr>
                                            <tr><td><code>&#123;%Image:1:x150&#125;</code></td><td>Auto width, 150px tall</td><td>Fixed-height row</td></tr>
                                            <tr><td><code>&#123;%Image:2&#125;</code>, <code>&#123;%Image:3&#125;</code>, ...</td><td>Second, third, ... attached image</td><td>Multi-photo templates</td></tr>
                                        </tbody>
                                    </table>

                                    <p><strong>Inside a loop:</strong> <code>&#123;%Image:1&#125;</code> resolves to the iterating record's first image, not the parent's. Works great for inspection reports, product catalogs, or line-item tables with thumbnails:</p>

                                    <pre style="background:#f4f6f9;padding:0.75rem;border-radius:4px;"><code>&#123;#OpportunityLineItems&#125;
  | &#123;Product2.Name&#125; | &#123;Quantity&#125; | &#123;%Image:1:100&#125; |
&#123;/OpportunityLineItems&#125;</code></pre>

                                    <p>Out-of-range indexes (<code>&#123;%Image:5&#125;</code> on a record with 2 images) render empty silently, so you can set up templates with more slots than records will always have.</p>

                                    <h4 style="margin-top:1.5rem;">Option 2: Image field (advanced)</h4>
                                    <p>When you need to choose a specific image that isn't the Nth attachment -- for example, a "Primary Photo" lookup pointing to a specific ContentVersion -- store the ContentVersion ID (starts with <code>068</code>) in a text field and reference it with the <code>%</code> prefix:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Happens</th><th>Use Case</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;%Logo__c&#125;</code></td><td>Image at original size</td><td>General use</td></tr>
                                            <tr><td><code>&#123;%Logo__c:200x60&#125;</code></td><td>Fixed at 200px wide, 60px tall</td><td>Letterhead logo</td></tr>
                                            <tr><td><code>&#123;%Logo__c:100%x&#125;</code></td><td>Full page width, auto height</td><td>Banner image</td></tr>
                                            <tr><td><code>&#123;%Logo__c:m100%x&#125;</code></td><td>Shrink to fit page, never upscale</td><td>Variable-size images</td></tr>
                                            <tr><td><code>&#123;%Logo__c:m100%xm50%&#125;</code></td><td>Max width + max height</td><td>Constrained area</td></tr>
                                            <tr><td><code>&#123;%Photo__c:150x150&#125;</code></td><td>Square thumbnail</td><td>Contact photo</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Both options work in PDF and DOCX output. You can also embed static images directly in your Word template (company logos, watermarks, etc.) -- they render in PDFs automatically without any tags.</p>
                                </section>

                                <section id="barcodes-qr" class="content-section">
                                    <h3 class="section-heading">Barcodes &amp; QR Codes</h3>
                                    <p>Render scannable codes from any field value. <strong>PDF output only</strong> -- no external services required.</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Appears</th><th>Use Case</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;*ProductCode&#125;</code></td><td>Code 128 barcode (default size)</td><td>Product labels</td></tr>
                                            <tr><td><code>&#123;*SKU:code128:300x80&#125;</code></td><td>Barcode at 300px x 80px</td><td>Shipping labels</td></tr>
                                            <tr><td><code>&#123;*Website:qr&#125;</code></td><td>QR code at 150px square</td><td>Link to website</td></tr>
                                            <tr><td><code>&#123;*TrackingUrl:qr:200&#125;</code></td><td>QR code at 200px square</td><td>Package tracking</td></tr>
                                        </tbody>
                                    </table>

                                    <p>QR codes support up to 255 characters. Both types render as pure CSS -- generated entirely in Apex, no external services needed.</p>
                                </section>

                                <section id="rich-text" class="content-section">
                                    <h3 class="section-heading">Rich Text Fields</h3>
                                    <p>Rich Text Area fields automatically preserve formatting. Just use a standard tag -- no special syntax:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>What You Type</th><th>What Appears</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td><code>&#123;Description&#125;</code></td><td>The field content with <strong>bold</strong>, <em>italic</em>, bulleted lists, numbered lists, images, hyperlinks, and tables -- all preserved.</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Works in both PDF and DOCX output. Images inside rich text fields render in PDFs. PowerPoint strips rich text to plain text.</p>
                                </section>

                                <section id="page-breaks" class="content-section">
                                    <h3 class="section-heading">Page Breaks in Loops</h3>
                                    <p>Generate one page per child record by inserting a Word page break inside the loop:</p>

                                    <div class="pro-tip-box">
                                        <strong>The Page Break Pattern:</strong>
                                        <ol>
                                            <li>Start your loop: <code>&#123;#Opportunities&#125;</code></li>
                                            <li>Design your page layout with merge tags.</li>
                                            <li>Insert a standard Word Page Break (Insert &gt; Page Break in Word).</li>
                                            <li>Add your closing tag: <code>&#123;/Opportunities&#125;</code></li>
                                        </ol>
                                    </div>

                                    <p>Each child record gets its own full page. Works with any child loop -- invoices, receipts, certificates, packing slips.</p>
                                </section>

                                <!-- ============================================ -->
                                <!-- PDF FEATURES -->
                                <!-- ============================================ -->

                                <section id="cover-pages" class="content-section">
                                    <h3 class="section-heading">Cover Pages &amp; Section Breaks</h3>
                                    <p>Create professional documents with clean title pages and proper page structure:</p>

                                    <ul class="bullet-list">
                                        <li><strong>Title pages</strong> -- Enable "Different First Page" in your Word template (Layout &gt; Different First Page). DocGen suppresses headers and footers on page 1 so your cover page stays clean.</li>
                                        <li><strong>Section breaks</strong> -- Section breaks in your Word template create proper page breaks in the PDF. Use Insert &gt; Page Break or Insert &gt; Section Break in Word.</li>
                                    </ul>

                                    <div class="card-tip info">
                                        <strong>Tip:</strong> Cover page detection uses the <code>&lt;w:titlePg/&gt;</code> flag in your document's section properties. No extra configuration needed -- just enable it in Word.
                                    </div>
                                </section>

                                <section id="headers-footers" class="content-section">
                                    <h3 class="section-heading">Headers &amp; Footers in PDFs</h3>
                                    <p>Headers and footers from your Word template carry into PDF output. They repeat on every page of the generated PDF.</p>

                                    <ul class="bullet-list">
                                        <li>Full formatting supported -- bold, italic, colors, borders, font sizes</li>
                                        <li>Merge tags work in headers and footers (<code>&#123;Name&#125;</code>, <code>&#123;Account.Name&#125;</code>)</li>
                                        <li>Images work in headers and footers (company logos, etc.)</li>
                                        <li>Add them in Word: Insert &gt; Header or Footer</li>
                                        <li>Use "Different First Page" to suppress headers on a cover page</li>
                                    </ul>
                                </section>

                                <section id="page-numbers" class="content-section">
                                    <h3 class="section-heading">Dynamic Page Numbers</h3>
                                    <p>Add "Page X of Y" numbering to your PDF headers or footers:</p>

                                    <div class="step-visual">
                                        <div class="step-card">
                                            <div class="num">1</div>
                                            <strong>Edit</strong>
                                            <p>In Word, double-click the header or footer to edit it.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">2</div>
                                            <strong>Insert</strong>
                                            <p>Go to Insert &gt; Page Number and pick a position.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">3</div>
                                            <strong>Total</strong>
                                            <p>Add "of Y" via Insert &gt; Quick Parts &gt; Field &gt; NumPages.</p>
                                        </div>
                                        <div class="step-card">
                                            <div class="num">4</div>
                                            <strong>Generate</strong>
                                            <p>Generate as PDF -- numbers increment dynamically on every page.</p>
                                        </div>
                                    </div>

                                    <div class="card-tip info">
                                        <strong>Tip:</strong> DocGen detects Word's PAGE and NUMPAGES field codes and converts them to dynamic CSS counters. Page numbers honor the font size, color, bold, and other formatting from your Word template.
                                    </div>
                                </section>

                                <section id="pdf-vs-docx" class="content-section">
                                    <h3 class="section-heading">PDF vs DOCX -- What Works Where</h3>
                                    <p>Most features work in both output formats. Here are the differences:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Feature</th><th>PDF</th><th>DOCX</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>All merge tags and formatting</td><td>Yes</td><td>Yes</td></tr>
                                            <tr><td>Bold, italic, underline, colors, font sizes</td><td>Yes</td><td>Yes</td></tr>
                                            <tr><td>Tables with borders, shading, column widths</td><td>Yes</td><td>Yes</td></tr>
                                            <tr><td>Template-embedded images</td><td>Yes</td><td>Yes</td></tr>
                                            <tr><td>Dynamic images from record fields</td><td>Yes</td><td>Yes</td></tr>
                                            <tr><td>Rich text field formatting</td><td>Yes</td><td>Yes</td></tr>
                                            <tr><td>Rich text images</td><td>Yes</td><td>No -- use <code>&#123;%Field&#125;</code> image tags</td></tr>
                                            <tr><td>Barcodes and QR codes</td><td>Yes</td><td>No</td></tr>
                                            <tr><td>Page numbers in headers/footers</td><td>Yes</td><td>N/A (Word handles natively)</td></tr>
                                            <tr><td>Cover page (no header on page 1)</td><td>Yes</td><td>N/A (Word handles natively)</td></tr>
                                            <tr><td>Custom fonts (Calibri, branded, etc.)</td><td>No -- falls back to Helvetica</td><td>Yes -- preserves original fonts</td></tr>
                                            <tr><td>Clickable hyperlinks</td><td>No -- rendered as styled text</td><td>Yes</td></tr>
                                        </tbody>
                                    </table>

                                    <div class="card-tip info">
                                        <strong>Rule of thumb:</strong> If you need barcodes, QR codes, or dynamic page numbers -- generate as PDF. If you need custom fonts or clickable hyperlinks -- generate as DOCX.
                                    </div>
                                </section>

                                <section id="pdf-fonts" class="content-section">
                                    <h3 class="section-heading">PDF Fonts</h3>
                                    <p>Salesforce's PDF engine supports these built-in fonts:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Font</th><th>CSS Name</th><th>When It's Used</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Helvetica</td><td><code>sans-serif</code></td><td>Default for all text</td></tr>
                                            <tr><td>Times</td><td><code>serif</code></td><td>If explicitly set in template</td></tr>
                                            <tr><td>Courier</td><td><code>monospace</code></td><td>Fixed-width text</td></tr>
                                            <tr><td>Arial Unicode MS</td><td>(automatic)</td><td>Chinese, Japanese, Korean, Thai, Arabic, Hebrew</td></tr>
                                        </tbody>
                                    </table>

                                    <p>Custom fonts from your Word template (Calibri, Cambria, branded typefaces) <strong>fall back to Helvetica</strong> in PDF output. If custom fonts matter, generate as DOCX -- Word preserves the original fonts.</p>
                                </section>

                                <section id="pdf-limitations" class="content-section">
                                    <h3 class="section-heading">PDF Limitations</h3>
                                    <p>These are Salesforce platform limitations, not DocGen bugs:</p>

                                    <table class="doc-table">
                                        <thead>
                                            <tr><th>Not Supported in PDF</th><th>Workaround</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Custom fonts (<code>@font-face</code>)</td><td>Generate as DOCX</td></tr>
                                            <tr><td>Text boxes and shapes</td><td>Use tables for layout</td></tr>
                                            <tr><td>SmartArt and charts</td><td>Insert as images in your template</td></tr>
                                            <tr><td>Clickable hyperlinks</td><td>Links work in DOCX output</td></tr>
                                            <tr><td>CSS Grid / Flexbox</td><td>Use tables (CSS 2.1 only)</td></tr>
                                            <tr><td>Even/odd page headers</td><td>Same header on all pages</td></tr>
                                            <tr><td>Multiple section-specific headers</td><td>One header/footer set per document</td></tr>
                                            <tr><td>Multi-column layouts</td><td>Use tables for column layouts instead of Word's Columns feature</td></tr>
                                        </tbody>
                                    </table>
                                </section>

                                <section id="rtl" class="content-section">
                                    <h3 class="section-heading">RTL Languages (Hebrew / Arabic)</h3>
                                    <p>DocGen supports right-to-left text in PDF output:</p>

                                    <ul class="bullet-list">
                                        <li>Hebrew and Arabic characters render correctly using Arial Unicode MS</li>
                                        <li>Paragraphs with <code>&lt;w:bidi/&gt;</code> align right automatically</li>
                                        <li>Tables with RTL layout reverse column order</li>
                                        <li>Mixed content (Hebrew label + English merge value) works correctly</li>
                                    </ul>

                                    <div class="card-tip warning">
                                        <strong>Known limitation:</strong> Long RTL paragraphs that wrap to multiple lines may have continuation lines starting from the left. This is a Salesforce PDF engine limitation.
                                    </div>
                                </section>
