<template>
    <div class="slds-var-p-around_medium">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:false={signerResults}>
            <!-- Template Selection -->
            <div class="slds-var-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-var-m-bottom_x-small">Documents</h3>

                <!-- Primary template picker — selecting auto-adds -->
                <lightning-combobox
                    name="selectTemplate"
                    label="Select Template"
                    value=""
                    placeholder="Choose a DocGen template..."
                    options={availableTemplateOptions}
                    onchange={handleTemplateSelected}>
                </lightning-combobox>

                <!-- Selected templates list -->
                <template if:true={hasSelectedTemplates}>
                    <div class="slds-var-m-top_small">
                        <template for:each={selectedTemplates} for:item="tmpl" for:index="index">
                            <div key={tmpl.id} class="slds-box slds-theme_shade slds-var-m-bottom_xx-small slds-var-p-around_small" style="border-radius:6px;">
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <template if:true={isPacketMode}>
                                        <div class="slds-col slds-no-flex slds-var-m-right_small" style="color:#706e6b;font-size:0.75rem;font-weight:bold;min-width:24px;">
                                            {tmpl.docNumber}
                                        </div>
                                    </template>
                                    <div class="slds-col slds-grow">
                                        <p class="slds-text-body_regular"><strong>{tmpl.name}</strong></p>
                                        <template if:true={tmpl.placementSummary}>
                                            <p class="slds-text-body_small slds-text-color_weak">{tmpl.placementSummary}</p>
                                        </template>
                                    </div>
                                    <div class="slds-col slds-no-flex slds-grid slds-grid_vertical-align-center" style="gap:4px;">
                                        <template if:true={isPacketMode}>
                                            <lightning-button-icon icon-name="utility:up" alternative-text="Move up" variant="bare" size="small" data-index={index} onclick={handleMoveTemplateUp}></lightning-button-icon>
                                            <lightning-button-icon icon-name="utility:down" alternative-text="Move down" variant="bare" size="small" data-index={index} onclick={handleMoveTemplateDown}></lightning-button-icon>
                                        </template>
                                        <lightning-button-icon icon-name="utility:close" alternative-text="Remove" variant="bare" size="small" data-index={index} onclick={handleRemoveTemplate}></lightning-button-icon>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Detected Placements Summary -->
            <template if:true={hasDetectedPlacements}>
                <div class="slds-box slds-theme_shade slds-var-m-bottom_medium" style="border-radius:6px;">
                    <div class="slds-grid slds-grid_vertical-align-center slds-var-m-bottom_xx-small">
                        <lightning-icon icon-name="utility:edit_form" size="x-small" class="slds-var-m-right_x-small"></lightning-icon>
                        <h3 class="slds-text-title_bold">Signature Placements Detected</h3>
                    </div>
                    <template for:each={placementSummaryByRole} for:item="ps">
                        <p key={ps.role} class="slds-text-body_small slds-var-p-left_small">
                            <span class="slds-badge slds-badge_lightest slds-var-m-right_xx-small">{ps.role}</span>
                            {ps.summary}
                        </p>
                    </template>
                </div>
            </template>

            <!-- Signing Order -->
            <div class="slds-var-m-bottom_medium">
                <lightning-radio-group
                    name="signingOrder"
                    label="Signing Order"
                    type="button"
                    options={signingOrderOptions}
                    value={signingOrder}
                    onchange={handleSigningOrderChange}>
                </lightning-radio-group>
            </div>

            <!-- Signers Table -->
            <div class="slds-var-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-var-m-bottom_x-small">Signers</h3>
                <template for:each={signers} for:item="signer" for:index="index">
                    <div key={signer.id} class="slds-box slds-theme_shade slds-var-m-bottom_x-small slds-var-p-around_small">
                        <div class="slds-grid slds-gutters_x-small slds-wrap">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                                <lightning-input
                                    type="text"
                                    name="role"
                                    label="Role"
                                    placeholder="Type or pick below"
                                    value={signer.roleName}
                                    data-index={index}
                                    onchange={handleRoleChange}
                                    required>
                                </lightning-input>
                                <template if:true={hasRoleSuggestions}>
                                    <div class="slds-var-m-top_xx-small slds-text-body_small slds-text-color_weak"
                                         style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;">
                                        <span style="font-size:11px;">Suggestions:</span>
                                        <template for:each={roleSuggestions} for:item="opt">
                                            <button key={opt.value}
                                                    type="button"
                                                    class="slds-badge"
                                                    style="cursor:pointer;border:1px solid #c9c9c9;background:#fff;padding:2px 8px;border-radius:12px;font-size:11px;"
                                                    data-index={index}
                                                    data-role={opt.value}
                                                    onclick={handleRoleSuggestionClick}
                                                    title={opt.title}>{opt.label}</button>
                                        </template>
                                    </div>
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                                <lightning-record-picker
                                    label="Contact"
                                    placeholder="Search contacts..."
                                    object-api-name="Contact"
                                    value={signer.contactId}
                                    data-index={index}
                                    onchange={handleContactChange}>
                                </lightning-record-picker>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12">
                                <lightning-input
                                    type="text"
                                    label="Name"
                                    value={signer.signerName}
                                    data-index={index}
                                    onchange={handleNameChange}
                                    required>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                                <lightning-input
                                    type="email"
                                    label="Email"
                                    value={signer.signerEmail}
                                    data-index={index}
                                    onchange={handleEmailChange}
                                    required>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-12 slds-grid slds-grid_vertical-align-end">
                                <lightning-button
                                    icon-name="utility:delete"
                                    label="Remove"
                                    title="Remove signer"
                                    variant="destructive-text"
                                    data-index={index}
                                    onclick={handleRemoveSigner}
                                    disabled={isRemoveDisabled}>
                                </lightning-button>
                            </div>
                        </div>
                    </div>
                </template>

                <lightning-button
                    label="Add Signer"
                    variant="neutral"
                    icon-name="utility:add"
                    onclick={handleAddSigner}
                    class="slds-var-m-top_x-small">
                </lightning-button>
            </div>

            <!-- Action Buttons -->
            <div class="slds-var-m-top_large slds-grid slds-gutters_small slds-wrap action-row">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-m-bottom_x-small">
                    <lightning-button
                        variant="neutral"
                        label="Preview Before Sending"
                        icon-name="utility:preview"
                        onclick={handleShowPreview}
                        disabled={isGenerateDisabled}
                        class="action-btn">
                    </lightning-button>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-medium-text-align_right">
                    <lightning-button
                        variant="brand"
                        label={generateButtonLabel}
                        onclick={handleGenerate}
                        disabled={isGenerateDisabled}
                        class="action-btn">
                    </lightning-button>
                </div>
            </div>

            <template if:true={error}>
                <div class="slds-text-color_error slds-var-m-top_medium">{error}</div>
            </template>
        </template>

        <!-- Success State -->
        <template if:true={signerResults}>
            <div class="slds-notify slds-notify_alert slds-theme_success slds-var-m-bottom_medium" role="alert">
                <h2>Signature Links Generated!</h2>
            </div>
            <p class="slds-var-m-bottom_small">Provide each signer with their unique secure link:</p>
            <template for:each={signerResults} for:item="result">
                <div key={result.signerUrl} class="slds-box slds-theme_shade slds-var-m-bottom_x-small slds-var-p-around_small">
                    <div class="slds-grid slds-grid_vertical-align-center slds-wrap">
                        <div class="slds-col slds-grow slds-size_1-of-1 slds-medium-size_8-of-12">
                            <p class="slds-text-body_regular">
                                <strong>{result.signerName}</strong>
                                <template if:true={result.roleName}>
                                    <span class="slds-badge slds-var-m-left_x-small">{result.roleName}</span>
                                </template>
                            </p>
                            <p class="slds-text-body_small" style="word-break: break-all;">
                                <a href={result.signerUrl} target="_blank">{result.signerUrl}</a>
                            </p>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-medium-text-align_right slds-var-m-top_x-small">
                            <lightning-button icon-name="utility:copy" label="Copy" variant="neutral"
                                data-url={result.signerUrl} onclick={handleCopyUrl} class="slds-var-m-right_x-small">
                            </lightning-button>
                            <lightning-button icon-name="utility:user" label="Sign In Person" variant="brand-outline"
                                title="Bypass email PIN verification — use only when the signer's identity is verified in person. Action is recorded in the signature audit log."
                                data-signer-id={result.signerId}
                                data-url={result.signerUrl}
                                data-signer-name={result.signerName}
                                onclick={handleSignInPerson}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </template>
            <lightning-button variant="neutral" label="Copy All Links" icon-name="utility:copy"
                onclick={handleCopyAllUrls} class="slds-var-m-top_small">
            </lightning-button>
        </template>

        <!-- Previous Requests -->
        <div class="slds-var-m-top_large">
            <lightning-button variant="neutral" label={previousRequestsLabel}
                icon-name="utility:clock" onclick={handleShowPreviousRequests}>
            </lightning-button>
        </div>
        <template if:true={showPreviousRequests}>
            <div class="slds-var-m-top_medium">
                <h3 class="slds-text-heading_small slds-var-m-bottom_x-small">Previous Signature Requests</h3>
                <template if:true={hasPreviousRequests}>
                    <template for:each={previousRequests} for:item="req">
                        <div key={req.id} class="slds-box slds-var-m-bottom_small">
                            <div class="slds-grid slds-grid_vertical-align-center slds-var-m-bottom_x-small">
                                <div class="slds-col slds-grow">
                                    <p><strong>{req.name}</strong> <span class={req.statusBadgeClass}>{req.status}</span></p>
                                    <p class="slds-text-body_small slds-text-color_weak">{req.documentTitle}</p>
                                </div>
                            </div>
                            <template for:each={req.signers} for:item="signer">
                                <div key={signer.signerUrl} class="slds-box slds-theme_shade slds-var-m-bottom_xx-small slds-var-p-around_x-small">
                                    <div class="slds-grid slds-grid_vertical-align-center">
                                        <div class="slds-col slds-no-flex slds-var-m-right_x-small">
                                            <lightning-icon icon-name={signer.statusIcon} variant={signer.statusVariant} size="x-small"></lightning-icon>
                                        </div>
                                        <div class="slds-col slds-grow">
                                            <p class="slds-text-body_small">
                                                <strong>{signer.signerName}</strong>
                                                <template if:true={signer.roleName}><span class="slds-badge slds-var-m-left_xx-small">{signer.roleName}</span></template>
                                                <span class="slds-text-color_weak slds-var-m-left_x-small">{signer.status}</span>
                                            </p>
                                        </div>
                                        <div class="slds-col slds-no-flex">
                                            <lightning-button icon-name="utility:copy" label="Copy" variant="neutral"
                                                data-url={signer.signerUrl} onclick={handleCopyPreviousUrl}>
                                            </lightning-button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </template>
                <template if:false={hasPreviousRequests}>
                    <p class="slds-text-body_regular slds-text-color_weak">No previous signature requests found for this record.</p>
                </template>
            </div>
        </template>

        <!-- Preview Modal -->
        <template if:true={showPreviewModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" alternative-text="Close"
                            class="slds-modal__close" onclick={handleClosePreview}></lightning-button-icon>
                        <h2 class="slds-text-heading_medium">Signature Request Preview</h2>
                    </header>
                    <div class="slds-modal__content slds-var-p-around_medium" style="max-height:70vh;overflow-y:auto;">
                        <!-- Signers + Placements Summary -->
                        <div class="slds-grid slds-wrap slds-gutters_small slds-var-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <h3 class="slds-text-title_bold slds-var-m-bottom_x-small">Signers</h3>
                                <template for:each={signers} for:item="signer">
                                    <div key={signer.id} class="slds-var-p-vertical_xx-small">
                                        <span class="slds-badge slds-var-m-right_x-small">{signer.roleName}</span>
                                        <strong>{signer.signerName}</strong>
                                        <span class="slds-text-body_small slds-text-color_weak slds-var-m-left_x-small">{signer.signerEmail}</span>
                                    </div>
                                </template>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <h3 class="slds-text-title_bold slds-var-m-bottom_x-small">Signing Requirements</h3>
                                <template for:each={placementSummaryByRole} for:item="ps">
                                    <div key={ps.role} class="slds-var-p-vertical_xx-small">
                                        <span class="slds-badge slds-var-m-right_x-small">{ps.role}</span>
                                        <span class="slds-text-body_small">{ps.summary}</span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Document Preview -->
                        <h3 class="slds-text-title_bold slds-var-m-bottom_x-small">Document Preview</h3>
                        <div class="slds-box" style="background:#fff;border:1px solid #e5e5e5;border-radius:6px;min-height:200px;">
                            <template if:true={previewLoading}>
                                <div style="text-align:center;padding:3rem;">
                                    <lightning-spinner alternative-text="Generating preview" size="medium"></lightning-spinner>
                                    <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_medium">Merging template with record data...</p>
                                </div>
                            </template>
                            <template if:false={previewLoading}>
                                <div class="preview-document-container" style="padding:1rem;font-size:0.8125rem;line-height:1.4;overflow-x:auto;"></div>
                            </template>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" variant="neutral" onclick={handleClosePreview}></lightning-button>
                        <lightning-button label="Send for Signature" variant="brand" onclick={handleSendFromPreview} class="slds-var-m-left_x-small"></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
